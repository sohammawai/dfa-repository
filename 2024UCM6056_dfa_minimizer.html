    /* ═══════════════════════════════
       GRANULAR STEP GENERATOR
    ═══════════════════════════════ */
    function generateGranularSteps(dfa, isNested = false) {
      const { states, alphabet } = dfa;
      const n = states.length;
      const steps = [];
      const pairKey = (a, b) => { const ia = states.indexOf(a), ib = states.indexOf(b); return ia < ib ? `${ia},${ib}` : `${ib},${ia}`; };

      // Init
      const initMarked = {};
      for (let i = 0; i < n; i++) for (let j = i + 1; j < n; j++) initMarked[`${i},${j}`] = false;
      steps.push({
        phase: 'init', round: 0, highlighted: null, isCheckingMarked: false, newlyMarked: [], marked: { ...initMarked },
        headline: 'Initialize Table', explanation: `Create a ${n}×${n} table for all ${Object.keys(initMarked).length} state pair${Object.keys(initMarked).length > 1 ? 's' : ''}.  Every pair starts <strong>unmarked</strong> — we assume all states are equivalent until proven otherwise.`,
        badge: null, badgeColor: null
      });

      // Base case — pair by pair
      const m1 = { ...initMarked }, baseMarked = [];
      for (let i = 0; i < n; i++) for (let j = i + 1; j < n; j++) {
        const key = `${i},${j}`, si = states[i], sj = states[j];
        const ai = dfa.accept.has(si), aj = dfa.accept.has(sj);
        const willMark = ai !== aj;
        steps.push({
          phase: 'base-check', round: 1, highlighted: key, isCheckingMarked: m1[key] || false, newlyMarked: [...baseMarked], marked: { ...m1 },
          headline: `Base Case — Checking (${si}, ${sj})`,
          explanation: `<strong>(${si}, ${sj})</strong>: ${si} is ${ai ? '<span style="color:#30D158">an accept state ✓</span>' : '<span style="color:#6E6E73">not an accept</span>'}, ${sj} is ${aj ? '<span style="color:#30D158">an accept state ✓</span>' : '<span style="color:#6E6E73">not an accept</span>'}.${willMark ? `  →  One accepts, one rejects → <strong style="color:#FF9F0A">MARK as distinguishable</strong>` : ' → Same type, leave unmarked for now.'}`,
          badge: willMark ? '✗ Distinguishable' : '≈ Same type', badgeColor: willMark ? '#FF9F0A' : '#6E6E73'
        });
        if (willMark) { m1[key] = true; baseMarked.push(key); }
      }
      steps.push({
        phase: 'base', round: 1, highlighted: null, isCheckingMarked: false, newlyMarked: [...baseMarked], marked: { ...m1 },
        headline: 'Base Case Complete',
        explanation: `Marked <strong>${baseMarked.length}</strong> pair${baseMarked.length !== 1 ? 's' : ''} where one state is accepting and the other is not${baseMarked.length ? `: <strong>${baseMarked.map(k => { const [i, j] = k.split(','); return `(${states[i]},${states[j]})`; }).join(', ')}</strong>` : ' (none)'}. Moving to iterative rounds.`,
        badge: `${baseMarked.length} marked`, badgeColor: '#FF9F0A'
      });

      // Iterative rounds
      let cur = { ...m1 }, roundNum = 2, changed = true;
      while (changed) {
        changed = false; const next = { ...cur }, newlyMarked = [];
        for (let i = 0; i < n; i++) for (let j = i + 1; j < n; j++) {
          const key = `${i},${j}`; if (cur[key]) continue;
          const si = states[i], sj = states[j];
          let markedThisPair = false;
          for (const sym of alphabet) {
            const ti = dfa.trans(si, sym), tj = dfa.trans(sj, sym);
            if (!ti || !tj || ti === tj) {
              steps.push({
                phase: 'iter-check', round: roundNum, highlighted: key, isCheckingMarked: false, newlyMarked: [...newlyMarked], marked: { ...next },
                headline: `Round ${roundNum} — (${si}, ${sj}) on '${sym}'`,
                explanation: `δ(<strong>${si}</strong>, <em>${sym}</em>) = <strong>${ti || '∅'}</strong>,  δ(<strong>${sj}</strong>, <em>${sym}</em>) = <strong>${tj || '∅'}</strong>. ${!ti || !tj ? 'A destination is undefined.' : 'Same destination — '}<span style="color:#6E6E73">no conclusion from this symbol.</span>`,
                badge: '→ skip', badgeColor: '#6E6E73'
              });
              continue;
            }
            const dk = pairKey(ti, tj), isDistinguished = cur[dk];
            steps.push({
              phase: 'iter-check', round: roundNum, highlighted: key, isCheckingMarked: isDistinguished && !markedThisPair, newlyMarked: [...newlyMarked], marked: { ...next },
              headline: `Round ${roundNum} — (${si}, ${sj}) on '${sym}'`,
              explanation: `δ(<strong>${si}</strong>, <em>${sym}</em>) = <strong>${ti}</strong>,  δ(<strong>${sj}</strong>, <em>${sym}</em>) = <strong>${tj}</strong>.  Pair (<strong>${ti}</strong>, <strong>${tj}</strong>) is <strong style="color:${isDistinguished ? '#FF453A' : '#6E6E73'}">${isDistinguished ? 'already marked ✗' : 'not yet marked'}</strong>.${isDistinguished && !markedThisPair ? `  →  <strong style="color:#FF9F0A">MARK (${si}, ${sj}) as distinguishable!</strong>` : '  →  No new marking.'}`,
              badge: isDistinguished && !markedThisPair ? '✗ Mark!' : '≈ No change', badgeColor: isDistinguished && !markedThisPair ? '#FF9F0A' : '#6E6E73'
            });
            if (isDistinguished && !markedThisPair) {
              next[key] = true; newlyMarked.push(key); changed = true; markedThisPair = true; break;
            }
          }
        }
        cur = next;
        steps.push({
          phase: changed ? 'iter' : 'done', round: roundNum, highlighted: null, isCheckingMarked: false, newlyMarked: [...newlyMarked], marked: { ...cur },
          headline: changed ? `Round ${roundNum} Summary` : `Algorithm Complete 🎉`,
          explanation: changed
            ? `Round <strong>${roundNum}</strong> complete. Newly marked: <strong>${newlyMarked.map(k => { const [i, j] = k.split(','); return `(${states[i]},${states[j]})`; }).join(', ') || 'none'}</strong>. Starting next round…`
            : `Round <strong>${roundNum}</strong>: no new pairs were marked. The algorithm has converged.  <strong>Unmarked pairs are indistinguishable states</strong> — they can be safely merged.`,
          badge: changed ? `+${newlyMarked.length} marked` : '✓ Done', badgeColor: changed ? '#FF9F0A' : '#30D158'
        });
        roundNum++;
      }

      // Add phase 2 verification natively if this was the main run
      if (!isNested) {
        const minResult = minimizeDFA(dfa);
        if (minResult.minDFA.states.length < n) {
          const tableStates = minResult.minDFA.states.map(s => {
            const grp = minResult.minDFA.labelMap[s];
            return grp ? `{${grp.join(',')}}` : s;
          });

          steps.push({
            phase: 'done', round: roundNum, highlighted: null, isCheckingMarked: false, newlyMarked: [], marked: { ...cur }, tableStates: states,
            headline: 'Phase 1 Complete: Form Groups',
            explanation: `All indistinguishable (unmarked) pairs will now be merged into <strong>Equivalence Groups</strong>. We will establish a new table with these groups as the states and run the algorithm again to prove minimality!`,
            badge: 'Setting up Verifier', badgeColor: '#5E5CE6'
          });

          const vSteps = generateGranularSteps(minResult.minDFA, true);
          vSteps.forEach(vs => {
            vs.tableStates = tableStates;
            if (vs.phase === 'init') {
              vs.headline = "Verification Phase: Initialize";
              vs.explanation = `Created a new ${tableStates.length}×${tableStates.length} table containing our merged groups. If our previous grouping was correct, <strong>every single pair</strong> on this new table will be marked distinguishable!`;
              vs.badge = "Phase 2";
              vs.badgeColor = "#FF9F0A";
            } else {
              vs.headline = `Verify: ${vs.headline}`;
              vs.badge = "Verification";
              vs.badgeColor = "#FF9F0A";
              if (vs.phase === 'done') {
                vs.headline = "Verification Complete: 100% Marked ✨";
                vs.explanation = "Every single pair in the new table has been marked. This mathematically proves that 0 indistinguishable pairs remain and our DFA is <strong>perfectly minimal!</strong>";
                vs.badge = "Fully Minimal";
                vs.badgeColor = "#30D158";
              }
            }
            steps.push(vs);
          });
        }
      }

      return steps;
    }

    /* ═══════════════════════════════
       MINIMIZE TAB
    ═══════════════════════════════ */
    function MinimizeTab({ dfa, onMinDone }) {
      const [granularSteps, setGranularSteps] = useState(null);
      const [minResult, setMinResult] = useState(null);
      const [currentIdx, setCurrentIdx] = useState(-1);
      const [isPlaying, setIsPlaying] = useState(false);
      const [speed, setSpeed] = useState(50); // 0–100
      const [meltGroups, setMeltGroups] = useState(null);
      const [showMin, setShowMin] = useState(false);
      const playRef = useRef(false);
      const timerRef = useRef(null);
      const explainRef = useRef(null);

      // Speed → delay ms: 0→2500ms, 50→800ms, 100→120ms
      const speedToDelay = s => Math.round(2500 * Math.pow(0.026, s / 100));

      const init = useCallback(() => {
        if (!dfa) return;
        const gs = generateGranularSteps(dfa);
        const mr = minimizeDFA(dfa);
        setGranularSteps(gs); setMinResult(mr); setCurrentIdx(-1);
        setIsPlaying(false); setMeltGroups(null); setShowMin(false);
        onMinDone(null);
        playRef.current = false;
        clearTimeout(timerRef.current);
      }, [dfa, onMinDone]);

      useEffect(() => { return () => { clearTimeout(timerRef.current); playRef.current = false; }; }, []);

      const isDone = granularSteps && currentIdx === granularSteps.length - 1;
      const curStep = granularSteps && currentIdx >= 0 ? granularSteps[currentIdx] : null;

      const goTo = useCallback((idx, steps, mr) => {
        const gs = steps || granularSteps, r = mr || minResult;
        if (!gs) return;
        const safe = Math.max(0, Math.min(idx, gs.length - 1));
        setCurrentIdx(safe);
        if (safe === gs.length - 1 && r) { onMinDone(r); }
        // scroll explain
        setTimeout(() => { explainRef.current?.scrollIntoView({ block: 'nearest', behavior: 'smooth' }); }, 40);
      }, [granularSteps, minResult, onMinDone]);

      const stepForward = useCallback(() => {
        if (!granularSteps || currentIdx >= granularSteps.length - 1) return;
        goTo(currentIdx + 1);
      }, [granularSteps, currentIdx, goTo]);

      const stepBack = useCallback(() => {
        if (!granularSteps || currentIdx <= 0) return;
        goTo(currentIdx - 1);
        onMinDone(null);
      }, [granularSteps, currentIdx, goTo, onMinDone]);

      const runAll = useCallback(() => {
        if (!granularSteps) return;
        setIsPlaying(false); playRef.current = false; clearTimeout(timerRef.current);
        goTo(granularSteps.length - 1);
      }, [granularSteps, goTo]);

      const reset = useCallback(() => {
        setIsPlaying(false); playRef.current = false; clearTimeout(timerRef.current);
        setCurrentIdx(-1); setMeltGroups(null); setShowMin(false); onMinDone(null);
      }, [onMinDone]);

      // Auto-play loop
      const scheduleNext = useCallback(() => {
        if (!playRef.current) return;
        timerRef.current = setTimeout(() => {
          setCurrentIdx(prev => {
            if (!granularSteps) { playRef.current = false; setIsPlaying(false); return prev; }
            if (prev >= granularSteps.length - 1) {
              playRef.current = false; setIsPlaying(false);
              if (minResult) onMinDone(minResult);
              return prev;
            }
            const nxt = prev + 1;
            if (nxt === granularSteps.length - 1 && minResult) onMinDone(minResult);
            setTimeout(scheduleNext, 0);
            return nxt;
          });
        }, speedToDelay(speed));
      }, [granularSteps, minResult, speed, onMinDone]);

      const togglePlay = useCallback(() => {
        if (!granularSteps) {
          const gs = generateGranularSteps(dfa);
          const mr = minimizeDFA(dfa);
          setGranularSteps(gs); setMinResult(mr); setCurrentIdx(-1);
          onMinDone(null);
          playRef.current = true; setIsPlaying(true);
          setTimeout(() => {
            setCurrentIdx(p => {
              const nxt = Math.max(0, p + 1);
              setTimeout(scheduleNext, 0);
              return nxt;
            });
          }, 100);
          return;
        }
        if (isPlaying) {
          playRef.current = false; setIsPlaying(false); clearTimeout(timerRef.current);
        } else {
          if (isDone) { setCurrentIdx(-1); onMinDone(null); }
          playRef.current = true; setIsPlaying(true);
          scheduleNext();
        }
      }, [granularSteps, isPlaying, isDone, dfa, onMinDone, scheduleNext]);

      useEffect(() => {
        if (isPlaying) { clearTimeout(timerRef.current); scheduleNext(); }
      }, [speed]);

      const total = granularSteps ? granularSteps.length : 0;
      const progress = total > 0 && currentIdx >= 0 ? Math.round(((currentIdx + 1) / total) * 100) : 0;

      const phaseColors = { init: '#5E5CE6', 'base-check': '#FF9F0A', base: '#FF9F0A', 'iter-check': '#0071E3', iter: '#0071E3', done: '#30D158' };
      const phaseLabels = { init: 'Initialize', 'base-check': 'Base Case', base: 'Base Case', 'iter-check': 'Iteration', iter: 'Iteration', done: 'Complete' };

      // ── Pair focus (click on marking table cell) ──
      const [focusedPair, setFocusedPair] = useState(null); // e.g. "1,3"
      const tableContainerRef = useRef(null);

      useEffect(() => {
        const el = tableContainerRef.current;
        if (!el) return;
        const handler = (e) => {
          const td = e.target.closest('td.mn-cell:not(.empty)');
          if (!td) return;
          const dataKey = td.dataset.pkey;
          if (!dataKey) return;
          setFocusedPair(prev => prev === dataKey ? null : dataKey);
        };
        el.addEventListener('click', handler);
        return () => el.removeEventListener('click', handler);
      }, [tableHTML]);

      // Build wheel steps: group by round milestones
      const wheelSteps = useMemo(() => {
        if (!granularSteps) return [];
        const milestones = [];
        const seenRounds = new Set();
        granularSteps.forEach((s, idx) => {
          const key = `${s.round}-${s.phase}`;
          if (!seenRounds.has(key) && ['init','base','iter','done'].includes(s.phase)) {
            seenRounds.add(key);
            milestones.push({ idx, label: s.phase === 'init' ? 'Init' : s.phase === 'base' ? 'Base' : s.phase === 'done' ? 'Done' : `R${s.round}`, phase: s.phase, round: s.round });
          }
        });
        return milestones;
      }, [granularSteps]);

      const groupColorMap = useMemo(() => {
        if (!minResult) return null;
        const map = {};
        minResult.finalPartitions.forEach((g, gi) => { const c = GROUP_COLORS[gi % GROUP_COLORS.length]; g.forEach(s => { map[s] = c; }); });
        return map;
      }, [minResult]);

      const tableHTML = useMemo(() => {
        if (!curStep) return '';
        const statesToUse = curStep.tableStates || dfa.states;
        return buildMNTableHTML(curStep.marked, curStep.newlyMarked, statesToUse, curStep.highlighted, curStep.isCheckingMarked);
      }, [curStep, dfa]);

      if (!dfa) return (
        <div className="animate-tab-in flex flex-col items-center justify-center py-24 text-center">
          <div style={{ fontSize: 48, marginBottom: 16, opacity: 0.35 }}>⚙</div>
          <p className="text-[#6E6E73] font-mono text-sm">Build a DFA on the <strong className="text-[#1D1D1F]">① Build</strong> tab first.</p>
        </div>
      );

      return (
        <div className="animate-tab-in flex flex-col gap-5">

          {/* ── Control Bar ── */}
          <div style={{ background: '#fff', border: '1px solid #D2D2D7', borderRadius: 20, padding: '18px 22px', boxShadow: '0 1px 4px rgba(0,0,0,.04),0 4px 24px rgba(0,0,0,.06)' }}>
            <div style={{ display: 'flex', alignItems: 'center', gap: 12, flexWrap: 'wrap', marginBottom: 16 }}>
              {/* Play / Pause */}
              <button onClick={e => { e.preventDefault(); togglePlay(); }}
                className={isPlaying ? 'play-btn-active' : ''}
                style={{ display: 'flex', alignItems: 'center', gap: 7, padding: '9px 20px', borderRadius: 14, border: 'none', background: isPlaying ? '#FF453A' : '#0071E3', color: '#fff', fontFamily: 'JetBrains Mono,monospace', fontSize: 12, fontWeight: 700, cursor: 'pointer', transition: 'background .2s,transform .15s,box-shadow .2s', minWidth: 110 }}
                onMouseEnter={e => e.currentTarget.style.transform = 'scale(1.04)'}
                onMouseLeave={e => e.currentTarget.style.transform = 'scale(1)'}>
                {isPlaying ? '⏸ Pause' : (isDone ? '↺ Replay' : (currentIdx < 0 ? '▶ Play' : '▶ Resume'))}
              </button>

              {/* Step Back */}
              <button onClick={e => { e.preventDefault(); stepBack(); }} disabled={!granularSteps || currentIdx <= 0 || isPlaying}
                style={{ display: 'flex', alignItems: 'center', gap: 5, padding: '9px 15px', borderRadius: 14, border: '1.5px solid #D2D2D7', background: '#fff', color: (!granularSteps || currentIdx <= 0 || isPlaying) ? '#C7C7CC' : '#1D1D1F', fontFamily: 'JetBrains Mono,monospace', fontSize: 12, fontWeight: 600, cursor: (!granularSteps || currentIdx <= 0 || isPlaying) ? 'not-allowed' : 'pointer', transition: 'all .15s' }}
                onMouseEnter={e => { if (!e.currentTarget.disabled) e.currentTarget.style.borderColor = '#5E5CE6'; }}
                onMouseLeave={e => e.currentTarget.style.borderColor = '#D2D2D7'}>
                ‹ Step Back
              </button>

              {/* Step Forward */}
              <button onClick={e => { e.preventDefault(); if (!granularSteps) { const gs = generateGranularSteps(dfa); const mr = minimizeDFA(dfa); setGranularSteps(gs); setMinResult(mr); goTo(0, gs, mr); } else stepForward(); }} disabled={isDone || isPlaying}
                style={{ display: 'flex', alignItems: 'center', gap: 5, padding: '9px 15px', borderRadius: 14, border: '1.5px solid #D2D2D7', background: '#fff', color: (isDone || isPlaying) ? '#C7C7CC' : '#1D1D1F', fontFamily: 'JetBrains Mono,monospace', fontSize: 12, fontWeight: 600, cursor: (isDone || isPlaying) ? 'not-allowed' : 'pointer', transition: 'all .15s' }}
                onMouseEnter={e => { if (!e.currentTarget.disabled) e.currentTarget.style.borderColor = '#0071E3'; }}
                onMouseLeave={e => e.currentTarget.style.borderColor = '#D2D2D7'}>
                Step Forward ›
              </button>

              {/* Run All */}
              <button onClick={() => { if (!granularSteps) { const gs = generateGranularSteps(dfa); const mr = minimizeDFA(dfa); setGranularSteps(gs); setMinResult(mr); goTo(gs.length - 1, gs, mr); } else runAll(); }} disabled={isDone || isPlaying}
                style={{ padding: '9px 15px', borderRadius: 14, border: 'none', background: 'rgba(255,159,10,.12)', color: (isDone || isPlaying) ? '#C7C7CC' : '#FF9F0A', fontFamily: 'JetBrains Mono,monospace', fontSize: 12, fontWeight: 700, cursor: (isDone || isPlaying) ? 'not-allowed' : 'pointer', transition: 'all .15s' }}>
                ⚡ Run All
              </button>

              {/* Reset */}
              <button onClick={reset}
                style={{ padding: '9px 15px', borderRadius: 14, border: '1.5px solid #D2D2D7', background: '#fff', color: '#6E6E73', fontFamily: 'JetBrains Mono,monospace', fontSize: 12, fontWeight: 600, cursor: 'pointer', transition: 'all .15s', marginLeft: 'auto' }}
                onMouseEnter={e => { e.currentTarget.style.borderColor = '#FF453A'; e.currentTarget.style.color = '#FF453A'; }}
                onMouseLeave={e => { e.currentTarget.style.borderColor = '#D2D2D7'; e.currentTarget.style.color = '#6E6E73'; }}>
                ↺ Reset
              </button>

            </div>

            {/* Wheel Progress Stepper */}
            <div style={{ marginBottom: 14 }}>
              <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 10 }}>
                <span style={{ fontFamily: 'JetBrains Mono,monospace', fontSize: 10, color: '#6E6E73', letterSpacing: '0.05em' }}>PROGRESS</span>
                <span style={{ fontFamily: 'JetBrains Mono,monospace', fontSize: 10, color: '#6E6E73' }}>
                  {currentIdx < 0 ? '—' : `Step ${currentIdx + 1} of ${total}`}
                </span>
              </div>
              {granularSteps && wheelSteps.length > 0 ? (
                <div style={{ position: 'relative', display: 'flex', alignItems: 'center', justifyContent: 'space-between', padding: '6px 0' }}>
                  {/* Connecting track */}
                  <div style={{ position: 'absolute', left: 16, right: 16, top: '50%', transform: 'translateY(-50%)', height: 3, background: '#E8E8ED', borderRadius: 99, zIndex: 0 }} />
                  {/* Filled portion */}
                  <div style={{
                    position: 'absolute', left: 16, top: '50%', transform: 'translateY(-50%)', height: 3, borderRadius: 99, zIndex: 0,
                    background: 'linear-gradient(90deg,#5E5CE6,#0071E3)',
                    width: (() => {
                      if (currentIdx < 0 || wheelSteps.length < 2) return '0%';
                      const activeWheelIdx = wheelSteps.filter(w => w.idx <= currentIdx).length - 1;
                      const pct = activeWheelIdx < 0 ? 0 : Math.round((activeWheelIdx / (wheelSteps.length - 1)) * 100);
                      return `calc(${pct}% * (100% - 32px) / 100%)`;
                    })(),
                    transition: 'width .35s cubic-bezier(.4,0,.2,1)'
                  }} />
                  {wheelSteps.map((ws, wi) => {
                    const isActive = ws.idx <= currentIdx;
                    const isCurrent = (() => {
                      // current wheel node = last milestone whose idx <= currentIdx
                      const last = wheelSteps.filter(w => w.idx <= currentIdx).slice(-1)[0];
                      return last && last.idx === ws.idx;
                    })();
                    const phaseC = { init: '#5E5CE6', base: '#FF9F0A', iter: '#0071E3', done: '#30D158' };
                    const c = phaseC[ws.phase] || '#0071E3';
                    return (
                      <div key={ws.idx} style={{ position: 'relative', zIndex: 1, display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 5, cursor: 'pointer', userSelect: 'none' }}
                        onClick={() => { if (!isPlaying) goTo(ws.idx); }}
                        title={`Jump to: ${ws.label}`}>
                        {/* Circle node */}
                        <div style={{
                          width: isCurrent ? 32 : 24, height: isCurrent ? 32 : 24,
                          borderRadius: '50%', display: 'flex', alignItems: 'center', justifyContent: 'center',
                          background: isActive ? c : '#fff',
                          border: `${isCurrent ? 3 : 2}px solid ${isActive ? c : '#D2D2D7'}`,
                          boxShadow: isCurrent ? `0 0 0 4px ${c}22, 0 4px 12px ${c}44` : isActive ? `0 2px 6px ${c}33` : 'none',
                          transition: 'all .25s cubic-bezier(.4,0,.2,1)',
                          fontSize: isCurrent ? 13 : 10,
                        }}>
                          {isActive
                            ? <span style={{ color: '#fff', fontWeight: 700, fontSize: isCurrent ? 12 : 9, fontFamily: 'JetBrains Mono,monospace' }}>{ws.phase === 'done' ? '✓' : wi + 1}</span>
                            : <span style={{ color: '#D2D2D7', fontWeight: 600, fontSize: 9, fontFamily: 'JetBrains Mono,monospace' }}>{wi + 1}</span>}
                        </div>
                        {/* Label */}
                        <span style={{
                          fontFamily: 'JetBrains Mono,monospace', fontSize: 8, fontWeight: isCurrent ? 700 : 500,
                          color: isCurrent ? c : isActive ? '#6E6E73' : '#C7C7CC',
                          whiteSpace: 'nowrap', transition: 'color .2s', letterSpacing: '0.03em'
                        }}>{ws.label}</span>
                      </div>
                    );
                  })}
                </div>
              ) : (
                <div style={{ height: 6, background: '#E8E8ED', borderRadius: 99, overflow: 'hidden' }}>
                  <div className="prog-fill" style={{ height: '100%', borderRadius: 99, background: 'linear-gradient(90deg,#5E5CE6,#0071E3)', width: `${progress}%` }} />
                </div>
              )}
            </div>

            {/* Speed Slider */}
            <div>
              <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 8 }}>
                <span style={{ fontFamily: 'JetBrains Mono,monospace', fontSize: 10, color: '#6E6E73', letterSpacing: '0.05em' }}>ANIMATION SPEED</span>
                <span style={{ fontFamily: 'JetBrains Mono,monospace', fontSize: 10, color: '#0071E3', fontWeight: 600 }}>
                  {speed < 20 ? '🐢 Slow' : speed < 50 ? '🚶 Normal' : speed < 80 ? '🏃 Fast' : '⚡ Turbo'}
                </span>
              </div>
              <div style={{ position: 'relative', paddingBottom: 18 }}>
                <input type="range" min="0" max="100" value={speed}
                  onChange={e => setSpeed(Number(e.target.value))}
                  className="speed-track"
                  style={{ '--fill': `${speed}%` }} />
                <div style={{ display: 'flex', justifyContent: 'space-between', marginTop: 4 }}>
                  {['Slow', 'Normal', 'Fast', 'Turbo'].map((l, i) => (
                    <span key={l} style={{ fontFamily: 'JetBrains Mono,monospace', fontSize: 9, color: speed >= i * 33 && speed < (i + 1) * 33 + 1 ? '#0071E3' : '#C7C7CC', transition: 'color .2s', userSelect: 'none' }}>{l}</span>
                  ))}
                </div>
              </div>
            </div>
          </div>

          <div style={{ display: 'grid', gap: 20, gridTemplateColumns: '1fr 1fr' }}>
            {/* MN Table */}
            <div style={{ background: '#fff', border: '1px solid #D2D2D7', borderTop: '3px solid #0071E3', borderRadius: 20, padding: 24, boxShadow: '0 1px 4px rgba(0,0,0,.04),0 4px 24px rgba(0,0,0,.06)' }}>
              <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 16 }}>
                <div>
                  <h2 style={{ fontFamily: 'JetBrains Mono,monospace', fontSize: 10, fontWeight: 700, color: '#6E6E73', textTransform: 'uppercase', letterSpacing: '0.08em' }}>Distinguishability Table</h2>
                  <div style={{ fontFamily: 'JetBrains Mono,monospace', fontSize: 9, color: '#6E6E73', marginTop: 2 }}>Myhill-Nerode</div>
                </div>
                {curStep && (
                  <div style={{ fontFamily: 'JetBrains Mono,monospace', fontSize: 10, fontWeight: 700, padding: '4px 12px', borderRadius: 99, background: `${phaseColors[curStep.phase]}18`, color: phaseColors[curStep.phase], border: `1px solid ${phaseColors[curStep.phase]}40` }}>
                    {phaseLabels[curStep.phase]}
                  </div>
                )}
              </div>
              {/* ── Inline mini-controls (keeps Pause/Prev/Next near the table) ── */}
              <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 14, flexWrap: 'wrap' }}>
                <button
                  onClick={e => { e.preventDefault(); togglePlay(); }}
                  style={{
                    display: 'flex', alignItems: 'center', gap: 5,
                    padding: '6px 14px', borderRadius: 10, border: 'none',
                    background: isPlaying ? '#FF453A' : '#0071E3',
                    color: '#fff', fontFamily: 'JetBrains Mono,monospace',
                    fontSize: 11, fontWeight: 700, cursor: 'pointer',
                    transition: 'background .2s', minWidth: 90,
                  }}>
                  {isPlaying ? '⏸ Pause' : (isDone ? '↺ Replay' : (currentIdx < 0 ? '▶ Play' : '▶ Resume'))}
                </button>
                <button
                  onClick={e => { e.preventDefault(); stepBack(); }}
                  disabled={!granularSteps || currentIdx <= 0 || isPlaying}
                  style={{
                    padding: '6px 12px', borderRadius: 10,
                    border: '1.5px solid #D2D2D7', background: '#fff',
                    color: (!granularSteps || currentIdx <= 0 || isPlaying) ? '#C7C7CC' : '#1D1D1F',
                    fontFamily: 'JetBrains Mono,monospace', fontSize: 11, fontWeight: 600,
                    cursor: (!granularSteps || currentIdx <= 0 || isPlaying) ? 'not-allowed' : 'pointer',
                    transition: 'all .15s',
                  }}>
                  ‹ Prev
                </button>
                <button
                  onClick={e => {
                    e.preventDefault();
                    if (!granularSteps) {
                      const gs = generateGranularSteps(dfa);
                      const mr = minimizeDFA(dfa);
                      setGranularSteps(gs); setMinResult(mr); goTo(0, gs, mr);
                    } else stepForward();
                  }}
                  disabled={isDone || isPlaying}
                  style={{
                    padding: '6px 12px', borderRadius: 10,
                    border: '1.5px solid #D2D2D7', background: '#fff',
                    color: (isDone || isPlaying) ? '#C7C7CC' : '#1D1D1F',
                    fontFamily: 'JetBrains Mono,monospace', fontSize: 11, fontWeight: 600,
                    cursor: (isDone || isPlaying) ? 'not-allowed' : 'pointer',
                    transition: 'all .15s',
                  }}>
                  Next ›
                </button>
                {currentIdx >= 0 && (
                  <span style={{ fontFamily: 'JetBrains Mono,monospace', fontSize: 9, color: '#6E6E73', marginLeft: 4 }}>
                    {currentIdx + 1} / {total}
                  </span>
                )}
              </div>

              {tableHTML
                ? <div ref={tableContainerRef} style={{ position: 'relative' }}>
                    {/* Focused Pair Overlay Banner */}
                    {focusedPair && granularSteps && (() => {
                      const [pi, pj] = focusedPair.split(',').map(Number);
                      const si = (curStep?.tableStates || dfa.states)[pi];
                      const sj = (curStep?.tableStates || dfa.states)[pj];
                      // Find which rounds have steps that reference this pair
                      const roundsWithPair = [];
                      granularSteps.forEach((s, idx) => {
                        if (s.highlighted === focusedPair || (s.newlyMarked && s.newlyMarked.includes(focusedPair))) {
                          const label = s.phase === 'base-check' || s.phase === 'base' ? 'Base' : s.phase === 'init' ? 'Init' : s.phase === 'done' ? 'Done' : `R${s.round}`;
                          if (!roundsWithPair.find(r => r.label === label)) {
                            roundsWithPair.push({ idx, label, phase: s.phase, isNewly: s.newlyMarked && s.newlyMarked.includes(focusedPair) });
                          }
                        }
                      });
                      return (
                        <div style={{
                          marginBottom: 10, padding: '10px 14px', borderRadius: 14,
                          background: 'rgba(48,209,88,0.07)', border: '1.5px solid rgba(48,209,88,0.35)',
                          display: 'flex', alignItems: 'center', gap: 10, flexWrap: 'wrap',
                          animation: 'fadeUp 0.25s cubic-bezier(.16,1,.3,1) forwards'
                        }}>
                          <span style={{ fontFamily: 'JetBrains Mono,monospace', fontSize: 10, color: '#6E6E73' }}>Pair</span>
                          <span style={{ fontFamily: 'JetBrains Mono,monospace', fontSize: 11, fontWeight: 700, padding: '3px 10px', borderRadius: 8, background: '#fff', border: '1.5px solid rgba(48,209,88,.4)', color: '#1a8a3a' }}>{si} ↔ {sj}</span>
                          <span style={{ fontFamily: 'JetBrains Mono,monospace', fontSize: 9, color: '#6E6E73' }}>appears in:</span>
                          {roundsWithPair.length > 0 ? roundsWithPair.map(r => (
                            <button key={r.label} onClick={() => { if (!isPlaying) goTo(r.idx); }}
                              style={{
                                fontFamily: 'JetBrains Mono,monospace', fontSize: 9, fontWeight: 700,
                                padding: '3px 10px', borderRadius: 99, border: 'none', cursor: 'pointer',
                                background: 'rgba(48,209,88,0.15)', color: '#1a8a3a',
                                border: '1px solid rgba(48,209,88,0.4)',
                                transition: 'all .15s'
                              }}
                              title={`Jump to step ${r.idx + 1}`}>
                              ● {r.label}
                            </button>
                          )) : <span style={{ fontFamily: 'JetBrains Mono,monospace', fontSize: 9, color: '#C7C7CC' }}>no rounds yet</span>}
                          <button onClick={() => setFocusedPair(null)}
                            style={{
                              marginLeft: 'auto', width: 22, height: 22, borderRadius: '50%', border: 'none',
                              background: 'rgba(0,0,0,0.06)', color: '#6E6E73', cursor: 'pointer',
                              fontFamily: 'system-ui', fontSize: 14, fontWeight: 700, display: 'flex', alignItems: 'center', justifyContent: 'center',
                              transition: 'all .15s', lineHeight: 1
                            }}
                            onMouseEnter={e => { e.currentTarget.style.background='rgba(255,69,58,0.12)'; e.currentTarget.style.color='#FF453A'; }}
                            onMouseLeave={e => { e.currentTarget.style.background='rgba(0,0,0,0.06)'; e.currentTarget.style.color='#6E6E73'; }}
                            title="Clear selection">×</button>
                        </div>
                      );
                    })()}
                    <style>{`
                      [data-pkey].mn-cell { transition: background .2s, box-shadow .2s, border-color .2s; }
                      [data-pkey].mn-cell:hover { box-shadow: 0 0 0 2px rgba(48,209,88,0.5); border-color: rgba(48,209,88,0.6) !important; background: rgba(48,209,88,0.06) !important; }
                      ${focusedPair ? `[data-pkey="${focusedPair}"].mn-cell { background: rgba(48,209,88,0.18) !important; border-color: #30D158 !important; border-width: 2px !important; box-shadow: 0 0 0 3px rgba(48,209,88,0.25) !important; transform: scale(1.12); }` : ''}
                    `}</style>
                    <div dangerouslySetInnerHTML={{ __html: tableHTML }} />
                  </div>
                : <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', height: 160, gap: 8 }}>
                  <div style={{ fontSize: 32, opacity: .2 }}>⬜</div>
                  <p style={{ fontFamily: 'JetBrains Mono,monospace', fontSize: 11, color: '#C7C7CC', textAlign: 'center' }}>Press Play or Step Forward<br />to start the algorithm.</p>
                </div>
              }
              {/* Hint */}
              {tableHTML && !focusedPair && (
                <div style={{ fontFamily: 'JetBrains Mono,monospace', fontSize: 9, color: '#C7C7CC', marginTop: 8, textAlign: 'center' }}>
                  Click any cell to trace that pair across all rounds
                </div>
              )}
              {/* Legend */}
              <div style={{ display: 'flex', gap: 14, marginTop: 16, flexWrap: 'wrap' }}>
                {[
                  { bg: 'rgba(0,113,227,.1)', border: '#0071E3', color: '#0071E3', label: 'Checking' },
                  { bg: 'rgba(255,159,10,.12)', border: '#FF9F0A', color: '#FF9F0A', label: 'Marking' },
                  { bg: '#dcfce7', border: '#86efac', color: '#30D158', label: 'Newly marked' },
                  { bg: '#f0fdf4', border: '#D2D2D7', color: '#30D158', label: 'Marked' },
                  { bg: '#fff', border: '#D2D2D7', color: '#6E6E73', label: 'Unmarked' },
                  { bg: 'rgba(48,209,88,0.18)', border: '#30D158', color: '#1a8a3a', label: 'Selected pair' },
                ].map(l => (
                  <div key={l.label} style={{ display: 'flex', alignItems: 'center', gap: 5, fontFamily: 'JetBrains Mono,monospace', fontSize: 9, color: '#6E6E73' }}>
                    <div style={{ width: 16, height: 16, background: l.bg, border: `1.5px solid ${l.border}`, borderRadius: 3, display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 9, color: l.color }}>✓</div>
                    {l.label}
                  </div>
                ))}
              </div>
            </div>

            {/* Explanation Panel */}
            <div style={{ background: '#fff', border: '1px solid #D2D2D7', borderTop: '3px solid #5E5CE6', borderRadius: 20, padding: 24, boxShadow: '0 1px 4px rgba(0,0,0,.04),0 4px 24px rgba(0,0,0,.06)', display: 'flex', flexDirection: 'column', gap: 0 }}>
              <h2 style={{ fontFamily: 'JetBrains Mono,monospace', fontSize: 10, fontWeight: 700, color: '#6E6E73', textTransform: 'uppercase', letterSpacing: '0.08em', marginBottom: 16 }}>Step Explanation</h2>

              {curStep ? (
                <div key={currentIdx} className="explain-card" ref={explainRef} style={{ flex: 1, display: 'flex', flexDirection: 'column', gap: 14 }}>
                  {/* Headline */}
                  <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
                    <div style={{ width: 36, height: 36, borderRadius: 10, background: `${phaseColors[curStep.phase]}15`, border: `1.5px solid ${phaseColors[curStep.phase]}35`, display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 16, flexShrink: 0 }}>
                      {curStep.phase === 'init' ? '🗂' : curStep.phase.includes('base') ? '🔍' : curStep.phase === 'done' ? '✅' : '⚙'}
                    </div>
                    <div>
                      <div style={{ fontFamily: 'JetBrains Mono,monospace', fontSize: 12, fontWeight: 700, color: '#1D1D1F', lineHeight: 1.3 }}>{curStep.headline}</div>
                      <div style={{ fontFamily: 'JetBrains Mono,monospace', fontSize: 9, color: '#6E6E73', marginTop: 2 }}>Round {curStep.round}</div>
                    </div>
                    {curStep.badge && (
                      <div style={{ marginLeft: 'auto', fontFamily: 'JetBrains Mono,monospace', fontSize: 10, fontWeight: 700, padding: '3px 10px', borderRadius: 99, background: `${curStep.badgeColor}18`, color: curStep.badgeColor, border: `1px solid ${curStep.badgeColor}40`, whiteSpace: 'nowrap' }}>
                        {curStep.badge}
                      </div>
                    )}
                  </div>

                  {/* Explanation text */}
                  <div style={{ fontFamily: 'JetBrains Mono,monospace', fontSize: 11, color: '#3a3a3c', lineHeight: 1.75, background: '#F5F5F7', borderRadius: 12, padding: '12px 14px', border: '1px solid #E8E8ED' }}
                    dangerouslySetInnerHTML={{ __html: curStep.explanation }} />

                  {/* Pair state chips if checking */}
                  {curStep.highlighted && (() => {
                    const [pi, pj] = curStep.highlighted.split(',').map(Number);
                    const si = dfa.states[pi], sj = dfa.states[pj];
                    const isMarked = curStep.marked[curStep.highlighted];
                    return (
                      <div style={{ display: 'flex', alignItems: 'center', gap: 10, padding: '12px 14px', background: curStep.isCheckingMarked ? 'rgba(255,159,10,.06)' : 'rgba(0,113,227,.05)', borderRadius: 12, border: `1px solid ${curStep.isCheckingMarked ? 'rgba(255,159,10,.25)' : 'rgba(0,113,227,.2)'}` }}>
                        <div style={{ fontFamily: 'JetBrains Mono,monospace', fontSize: 9, color: '#6E6E73', textTransform: 'uppercase', letterSpacing: '0.06em', marginRight: 4 }}>Pair</div>
                        <div style={{ fontFamily: 'JetBrains Mono,monospace', fontSize: 12, fontWeight: 700, padding: '4px 11px', borderRadius: 8, background: '#fff', border: '1.5px solid #D2D2D7', color: '#0071E3' }}>{si}</div>
                        <div style={{ fontFamily: 'JetBrains Mono,monospace', fontSize: 14, color: '#C7C7CC' }}>↔</div>
                        <div style={{ fontFamily: 'JetBrains Mono,monospace', fontSize: 12, fontWeight: 700, padding: '4px 11px', borderRadius: 8, background: '#fff', border: '1.5px solid #D2D2D7', color: '#0071E3' }}>{sj}</div>
                        {isMarked && <div style={{ marginLeft: 'auto', fontFamily: 'JetBrains Mono,monospace', fontSize: 10, fontWeight: 700, padding: '3px 10px', borderRadius: 99, background: 'rgba(48,209,88,.1)', color: '#1a8a3a', border: '1px solid rgba(48,209,88,.3)' }}>✓ Marked</div>}
                      </div>
                    );
                  })()}

                  {/* Progress within round for iteration */}
                  {curStep.phase === 'iter-check' && (
                    <div style={{ fontFamily: 'JetBrains Mono,monospace', fontSize: 9, color: '#6E6E73', display: 'flex', alignItems: 'center', gap: 6 }}>
                      <div style={{ width: 8, height: 8, borderRadius: '50%', background: '#0071E3', animation: 'pulse-green 1.5s ease-in-out infinite' }} />
                      Iterative pass · Round {curStep.round}
                    </div>
                  )}
                </div>
              ) : (
                <div style={{ flex: 1, display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', gap: 12, minHeight: 200 }}>
                  <div style={{ width: 52, height: 52, borderRadius: 14, background: 'rgba(94,92,230,.07)', border: '1.5px solid rgba(94,92,230,.2)', display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 24 }}>🧮</div>
                  <div style={{ textAlign: 'center' }}>
                    <div style={{ fontFamily: 'JetBrains Mono,monospace', fontSize: 12, fontWeight: 600, color: '#1D1D1F', marginBottom: 4 }}>Ready to Minimize</div>
                    <div style={{ fontFamily: 'JetBrains Mono,monospace', fontSize: 10, color: '#6E6E73', lineHeight: 1.6 }}>Press <strong>Play</strong> for auto-animation<br />or <strong>Step Forward</strong> for manual control.</div>
                  </div>
                </div>
              )}
            </div>
          </div>

          {/* Grouping Phase Panel */}
          {isDone && minResult && (
            <GroupingPhasePanel dfa={dfa} minResult={minResult} />
          )}

          {/* Original graph with group coloring */}
          {isDone && minResult && (
            <div style={{ background: '#fff', border: '1px solid #D2D2D7', borderTop: '3px solid #FF9F0A', borderRadius: 20, padding: 20, boxShadow: '0 1px 4px rgba(0,0,0,.04),0 4px 24px rgba(0,0,0,.06)' }}>
              <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 14 }}>
                <h2 style={{ fontFamily: 'JetBrains Mono,monospace', fontSize: 10, fontWeight: 700, color: '#6E6E73', textTransform: 'uppercase', letterSpacing: '0.08em', display: 'flex', alignItems: 'center', gap: 14 }}>
                  Original DFA — Equivalence Groups
                </h2>
                <div style={{ display: 'flex', gap: 8, flexWrap: 'wrap' }}>
                  {minResult.finalPartitions.map((g, i) => (
                    <div key={i} style={{ display: 'flex', alignItems: 'center', gap: 5, fontFamily: 'JetBrains Mono,monospace', fontSize: 10, color: GROUP_COLORS[i % GROUP_COLORS.length] }}>
                      <div style={{ width: 8, height: 8, borderRadius: '50%', background: GROUP_COLORS[i % GROUP_COLORS.length] }} />
                      {'{' + g.join(',') + '}'}
                    </div>
                  ))}
                </div>
              </div>
              <ForceGraph dfa={dfa} groupColorMap={groupColorMap} height={300} />
            </div>
          )}

          {/* Result */}
          <div style={{ background: '#fff', border: '1px solid #D2D2D7', borderTop: '3px solid #30D158', borderRadius: 20, padding: 24, boxShadow: '0 1px 4px rgba(0,0,0,.04),0 4px 24px rgba(0,0,0,.06)' }}>
            <h2 style={{ fontFamily: 'JetBrains Mono,monospace', fontSize: 10, fontWeight: 700, color: '#6E6E73', textTransform: 'uppercase', letterSpacing: '0.08em', marginBottom: 16, display: 'flex', alignItems: 'center', gap: 8 }}>
              Minimized DFA
              {isDone && minResult && <span style={{ fontFamily: 'JetBrains Mono,monospace', fontSize: 9, fontWeight: 700, padding: '3px 10px', borderRadius: 99, background: 'rgba(48,209,88,.1)', color: '#1a8a3a', border: '1px solid rgba(48,209,88,.3)' }}>Done ✓</span>}
            </h2>
            {isDone && minResult
              ? <MinResultDisplay minResult={minResult} originalDFA={dfa} showGraph={true} />
              : <p style={{ fontFamily: 'JetBrains Mono,monospace', fontSize: 11, color: '#C7C7CC' }}>Complete all steps to see the minimized DFA.</p>}
          </div>
        </div>
      );
    }

    /* ═══════════════════════════════
       GROUPING PHASE PANEL
    ═══════════════════════════════ */
    function GroupingPhasePanel({ dfa, minResult }) {
      const [phase, setPhase] = useState('pairs'); // 'pairs' | 'groups' | 'transitions'
      const states = dfa.states;
      const n = states.length;
      const finalMarked = minResult.steps[minResult.steps.length - 1]?.marked || {};

      // Collect all unmarked pairs
      const unmarkedPairs = [];
      for (let i = 0; i < n; i++) {
        for (let j = i + 1; j < n; j++) {
          if (!finalMarked[`${i},${j}`]) {
            unmarkedPairs.push([states[i], states[j]]);
          }
        }
      }

      const { finalPartitions } = minResult;
      const hasGroups = finalPartitions.some(g => g.length > 1);

      // Build transition table for minimized DFA
      const minDFA = minResult.minDFA;
      const labelMap = {};
      finalPartitions.forEach((g, i) => { labelMap[`M${i}`] = `{${g.join(',')}}`; });

      return (
        <div style={{ background: '#fff', border: '1px solid #D2D2D7', borderTop: '3px solid #FF9F0A', borderRadius: 20, padding: 24, boxShadow: '0 1px 4px rgba(0,0,0,.04),0 4px 24px rgba(0,0,0,.06)' }}>
          {/* Header */}
          <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 18 }}>
            <div>
              <h2 style={{ fontFamily: 'JetBrains Mono,monospace', fontSize: 10, fontWeight: 700, color: '#6E6E73', textTransform: 'uppercase', letterSpacing: '0.08em' }}>Grouping Phase</h2>
              <div style={{ fontFamily: 'JetBrains Mono,monospace', fontSize: 9, color: '#6E6E73', marginTop: 2 }}>Merge indistinguishable states</div>
            </div>
            {/* Phase stepper tabs */}
            <div style={{ display: 'flex', gap: 4, background: '#F5F5F7', borderRadius: 12, padding: 4 }}>
              {[['pairs', '① Unmarked Pairs'], ['groups', '② Equivalence Groups'], ['transitions', '③ New Transitions']].map(([p, lbl]) => (
                <button key={p} onClick={() => setPhase(p)}
                  style={{
                    padding: '5px 10px', borderRadius: 8, border: 'none', cursor: 'pointer',
                    fontFamily: 'JetBrains Mono,monospace', fontSize: 9.5, fontWeight: 600,
                    background: phase === p ? '#FF9F0A' : 'transparent',
                    color: phase === p ? '#fff' : '#6E6E73', transition: 'all .2s'
                  }}>
                  {lbl}
                </button>
              ))}
            </div>
          </div>

          {/* Phase: Unmarked Pairs */}
          {phase === 'pairs' && (
            <div>
              <div style={{ fontFamily: 'JetBrains Mono,monospace', fontSize: 10, color: '#6E6E73', marginBottom: 12, lineHeight: 1.7 }}>
                These <strong style={{ color: '#1D1D1F' }}>{unmarkedPairs.length}</strong> pair{unmarkedPairs.length !== 1 ? 's' : ''} remained <span style={{ color: '#30D158', fontWeight: 700 }}>unmarked</span> after all rounds — they cannot be distinguished, so they will be merged.
              </div>
              {unmarkedPairs.length === 0 ? (
                <div style={{ fontFamily: 'JetBrains Mono,monospace', fontSize: 11, color: '#C7C7CC', textAlign: 'center', padding: '24px 0' }}>All pairs were marked — the DFA is already minimal!</div>
              ) : (
                <div style={{ display: 'flex', flexWrap: 'wrap', gap: 8 }}>
                  {unmarkedPairs.map(([a, b], idx) => (
                    <div key={`${a}-${b}`} className="pair-chip"
                      style={{
                        animationDelay: `${idx * 50}ms`, display: 'inline-flex', alignItems: 'center', gap: 6,
                        padding: '7px 12px', borderRadius: 10,
                        background: 'rgba(48,209,88,0.06)', border: '1.5px solid rgba(48,209,88,0.25)',
                        fontFamily: 'JetBrains Mono,monospace', fontSize: 11, fontWeight: 600, color: '#1a8a3a'
                      }}>
                      <span>{a}</span><span style={{ color: '#C7C7CC', fontWeight: 400 }}>≡</span><span>{b}</span>
                    </div>
                  ))}
                </div>
              )}
              <div style={{ marginTop: 16, display: 'flex', justifyContent: 'flex-end' }}>
                <button onClick={() => setPhase('groups')}
                  style={{
                    padding: '8px 16px', borderRadius: 10, border: 'none', background: '#FF9F0A', color: '#fff',
                    fontFamily: 'JetBrains Mono,monospace', fontSize: 11, fontWeight: 700, cursor: 'pointer'
                  }}>
                  Form Groups →
                </button>
              </div>
            </div>
          )}

          {/* Phase: Equivalence Groups */}
          {phase === 'groups' && (
            <div>
              <div style={{ fontFamily: 'JetBrains Mono,monospace', fontSize: 10, color: '#6E6E73', marginBottom: 16, lineHeight: 1.7 }}>
                States in the same equivalence class are merged into a <strong style={{ color: '#1D1D1F' }}>single state</strong> in the minimized DFA.
              </div>
              <div style={{ display: 'grid', gap: 10, gridTemplateColumns: 'repeat(auto-fill,minmax(200px,1fr))' }}>
                {finalPartitions.map((g, i) => {
                  const color = GROUP_COLORS[i % GROUP_COLORS.length];
                  const isAccept = g.some(s => dfa.accept.has(s));
                  const isStart = g.includes(dfa.start);
                  return (
                    <div key={i} className="group-card"
                      style={{
                        animationDelay: `${i * 80}ms`,
                        padding: '14px 16px', borderRadius: 14,
                        background: `${color}0d`, border: `1.5px solid ${color}40`
                      }}>
                      <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 10 }}>
                        <div style={{ fontFamily: 'JetBrains Mono,monospace', fontSize: 14, fontWeight: 800, color }}>
                          M{i}
                        </div>
                        <div style={{ display: 'flex', gap: 4 }}>
                          {isStart && <span style={{ fontFamily: 'JetBrains Mono,monospace', fontSize: 8, fontWeight: 700, padding: '2px 7px', borderRadius: 99, background: '#FF9F0A22', color: '#FF9F0A', border: '1px solid #FF9F0A40' }}>START</span>}
                          {isAccept && <span style={{ fontFamily: 'JetBrains Mono,monospace', fontSize: 8, fontWeight: 700, padding: '2px 7px', borderRadius: 99, background: `${color}22`, color, border: `1px solid ${color}40` }}>ACCEPT</span>}
                        </div>
                      </div>
                      <div style={{ display: 'flex', flexWrap: 'wrap', gap: 5 }}>
                        {g.map(s => (
                          <span key={s} style={{
                            fontFamily: 'JetBrains Mono,monospace', fontSize: 11, fontWeight: 600,
                            padding: '4px 9px', borderRadius: 7, background: '#fff',
                            border: `1.5px solid ${color}50`, color: '#1D1D1F'
                          }}>{s}</span>
                        ))}
                      </div>
                      {g.length > 1 && (
                        <div style={{ marginTop: 8, fontFamily: 'JetBrains Mono,monospace', fontSize: 9, color, opacity: 0.8 }}>
                          ↳ {g.length} states merged
                        </div>
                      )}
                    </div>
                  );
                })}
              </div>
              <div style={{ marginTop: 16, display: 'flex', justifyContent: 'flex-end' }}>
                <button onClick={() => setPhase('transitions')}
                  style={{
                    padding: '8px 16px', borderRadius: 10, border: 'none', background: '#FF9F0A', color: '#fff',
                    fontFamily: 'JetBrains Mono,monospace', fontSize: 11, fontWeight: 700, cursor: 'pointer'
                  }}>
                  See Transitions →
                </button>
              </div>
            </div>
          )}

          {/* Phase: New Transitions */}
          {phase === 'transitions' && (
            <div>
              <div style={{ fontFamily: 'JetBrains Mono,monospace', fontSize: 10, color: '#6E6E73', marginBottom: 14, lineHeight: 1.7 }}>
                Each merged state's transitions are inherited from any representative of its group. This gives us the complete minimized DFA δ.
              </div>
              <div style={{ overflowX: 'auto' }}>
                <table className="dfa-table" style={{ marginBottom: 0 }}>
                  <thead>
                    <tr>
                      <th>State (group)</th>
                      {minDFA.alphabet.map(a => <th key={a}>{a}</th>)}
                      <th>Accept?</th>
                    </tr>
                  </thead>
                  <tbody>
                    {minDFA.states.map((ms, i) => {
                      const color = GROUP_COLORS[i % GROUP_COLORS.length];
                      const isStart = minDFA.start === ms;
                      const isAcc = minDFA.accept.has(ms);
                      return (
                        <tr key={ms}>
                          <td style={{ fontWeight: 700, color, textAlign: 'left', paddingLeft: 14 }}>
                            {isStart ? '→ ' : '  '}{ms} = {labelMap[ms]}
                          </td>
                          {minDFA.alphabet.map(sym => {
                            const dest = minDFA.trans(ms, sym);
                            const di = minDFA.states.indexOf(dest);
                            return (
                              <td key={sym} style={{ color: dest ? GROUP_COLORS[di % GROUP_COLORS.length] : '#C7C7CC', fontWeight: 600 }}>
                                {dest || '—'}
                              </td>
                            );
                          })}
                          <td>
                            {isAcc
                              ? <span style={{ fontFamily: 'JetBrains Mono,monospace', fontSize: 10, fontWeight: 700, padding: '2px 8px', borderRadius: 99, background: 'rgba(48,209,88,0.1)', color: '#1a8a3a', border: '1px solid rgba(48,209,88,0.3)' }}>✓</span>
                              : <span style={{ color: '#D2D2D7' }}>—</span>}
                          </td>
                        </tr>
                      );
                    })}
                  </tbody>
                </table>
              </div>
            </div>
          )}
        </div>
      );
    }

    function MinResultDisplay({ minResult, originalDFA, showGraph }) {
      const { minDFA, finalPartitions } = minResult;
      const labelMap = {};
      finalPartitions.forEach((g, i) => { labelMap[`M${i}`] = `{${g.join(',')}}`; });
      const acc = [...minDFA.accept];
      const equivGroups = finalPartitions.filter(g => g.length > 1);
      const origN = originalDFA.states.length, minN = minDFA.states.length;
      const pct = origN > 0 ? Math.round((1 - minN / origN) * 100) : 0;
      return (
        <div>
          <div className="grid gap-4 mb-4 grid-2col" style={{ gridTemplateColumns: '1fr 1fr' }}>
            {[
              { label: `States (${minDFA.states.length})`, val: minDFA.states.map(s => `${s} = ${labelMap[s]}`).join(', ') },
              { label: 'Alphabet', val: minDFA.alphabet.join(', ') },
              { label: 'Start State', val: `${minDFA.start} = ${labelMap[minDFA.start]}` },
              { label: 'Accept States', val: acc.map(s => `${s} = ${labelMap[s]}`).join(', ') || '∅' },
            ].map(item => (
              <div key={item.label}>
                <div className="font-mono text-[11px] font-semibold text-[#5E5CE6] mb-1">{item.label}</div>
                <div className="font-mono text-xs text-[#1D1D1F]">{item.val}</div>
              </div>
            ))}
          </div>
          {equivGroups.length > 0 && (
            <div className="mb-4">
              <div className="font-mono text-[11px] text-[#6E6E73] mb-2">Merged equivalence classes:</div>
              <div className="flex flex-wrap gap-2">{equivGroups.map((g, i) => <div key={i} className="mn-equiv-class">{`{${g.join(', ')}}`}</div>)}</div>
            </div>
          )}
          <div className="grid gap-3 mb-5 grid-2col" style={{ gridTemplateColumns: 'repeat(3,1fr)' }}>
            <div className="stat-box"><span className="stat-val">{origN}</span><div className="stat-label">Original States</div></div>
            <div className="stat-box"><span className="stat-val">{minN}</span><div className="stat-label">Minimized States</div></div>
            <div className={`stat-box ${pct > 0 ? 'reduction' : 'no-reduction'}`}><span className="stat-val">{pct}%</span><div className="stat-label">{pct > 0 ? 'State Reduction' : 'No Reduction'}</div></div>
          </div>
          {showGraph && <ForceGraph dfa={minDFA} groups={minDFA.states.map(s => [s])} height={300} />}
        </div>
      );
    }

    /* ═══════════════════════════════
       SIMULATE TAB  (DUAL SIM — SHARED INPUT)
    ═══════════════════════════════ */
    function SimulateTab({ dfa, minResult }) {
      const [input, setInput] = useState('');
      const [stepIdx, setStepIdx] = useState(-1);
      const [playing, setPlaying] = useState(false);
      const playRef = useRef(null);

      const origSim = useMemo(() => (input !== '' && dfa) ? simulateDFA(dfa, input) : null, [input, dfa]);
      const minSim = useMemo(() => (input !== '' && minResult) ? simulateDFA(minResult.minDFA, input) : null, [input, minResult]);

      const maxStep = origSim ? origSim.path.length - 1 : 0;

      const goToStep = useCallback(idx => {
        setStepIdx(Math.max(-1, Math.min(idx, maxStep)));
      }, [maxStep]);

      // Auto-play
      useEffect(() => {
        if (!playing) { clearInterval(playRef.current); return; }
        playRef.current = setInterval(() => {
          setStepIdx(prev => {
            if (prev >= maxStep) { setPlaying(false); return prev; }
            return prev + 1;
          });
        }, 650);
        return () => clearInterval(playRef.current);
      }, [playing, maxStep]);

      const onInputChange = e => {
        setInput(e.target.value);
        setStepIdx(-1);
        setPlaying(false);
      };

      // Highlight states
      const origHL = useMemo(() => {
        if (!origSim || stepIdx < 0) return new Set();
        const s = origSim.path[Math.min(stepIdx, origSim.path.length - 1)].state;
        return s ? new Set([s]) : new Set();
      }, [origSim, stepIdx]);

      const minHL = useMemo(() => {
        if (!minSim || stepIdx < 0) return new Set();
        const s = minSim.path[Math.min(stepIdx, minSim.path.length - 1)].state;
        return s ? new Set([s]) : new Set();
      }, [minSim, stepIdx]);

      if (!dfa) return (
        <div className="animate-tab-in flex flex-col items-center justify-center py-24 text-center">
          <div className="text-5xl mb-4">▶</div>
          <p className="text-[#6E6E73] font-mono text-sm">Build a DFA on the <strong className="text-[#1D1D1F]">① Build</strong> tab first.</p>
        </div>
      );

      const curOrigState = origSim && stepIdx >= 0 ? origSim.path[Math.min(stepIdx, origSim.path.length - 1)] : null;
      const curMinState = minSim && stepIdx >= 0 ? minSim.path[Math.min(stepIdx, minSim.path.length - 1)] : null;

      const bothDone = stepIdx === maxStep && origSim && minSim;
      const agree = bothDone && origSim.accepted === minSim.accepted;

      return (
        <div className="animate-tab-in flex flex-col gap-5">
          {/* Shared input + controls */}
          <div className="bg-white border border-[#D2D2D7] rounded-2xl px-5 py-4 shadow-card" style={{ borderTop: '3px solid #5E5CE6' }}>
            <div className="font-mono text-xs font-bold text-[#6E6E73] uppercase tracking-widest mb-3">
              Synchronized Test — runs both DFAs simultaneously
            </div>
            <input value={input} onChange={onInputChange} placeholder="Type a string to run on both DFAs simultaneously…"
              className="mono-input" style={{ marginBottom: 12 }} />
            <div style={{ display: 'flex', alignItems: 'center', gap: 8, flexWrap: 'wrap' }}>
              {[
                { lbl: '⏮', fn: () => { setPlaying(false); goToStep(0); } },
                { lbl: '‹', fn: () => goToStep(stepIdx - 1) },
                { lbl: playing ? '⏸ Pause' : '▶ Play', fn: () => setPlaying(p => !p), primary: true },
                { lbl: '›', fn: () => goToStep(stepIdx + 1) },
                { lbl: '⏭', fn: () => { setPlaying(false); goToStep(maxStep); } },
              ].map((b, i) => (
                <button key={i} onClick={b.fn} disabled={!origSim && b.lbl !== (playing ? '⏸ Pause' : '▶ Play')}
                  style={{
                    fontFamily: 'JetBrains Mono,monospace', fontSize: 12, fontWeight: b.primary ? 700 : 500, padding: b.primary ? '8px 18px' : '7px 12px', borderRadius: 10, border: 'none',
                    background: b.primary ? '#0071E3' : '#F5F5F7', color: b.primary ? '#fff' : '#1D1D1F', cursor: 'pointer', transition: 'all .2s'
                  }}>
                  {b.lbl}
                </button>
              ))}
              <span style={{ fontFamily: 'JetBrains Mono,monospace', fontSize: 11, color: '#6E6E73', marginLeft: 6 }}>
                {origSim ? `Step ${Math.max(0, stepIdx)} / ${maxStep}` : 'Enter a string above'}
              </span>
              {/* Char indicator */}
              {origSim && stepIdx >= 0 && stepIdx > 0 && origSim.path[stepIdx] && (
                <span style={{ fontFamily: 'JetBrains Mono,monospace', fontSize: 11, color: '#5E5CE6', background: 'rgba(94,92,230,.08)', border: '1px solid rgba(94,92,230,.2)', borderRadius: 6, padding: '4px 10px' }}>
                  Read: '{input[stepIdx - 1]}'
                </span>
              )}
            </div>
          </div>

          {/* Dual graphs */}
          <div className="grid gap-5 grid-2col" style={{ gridTemplateColumns: '1fr 1fr' }}>
            {/* Original */}
            <div className="sim-track-card" style={{ borderTop: '3px solid #FF9F0A' }}>
              <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 12 }}>
                <div>
                  <div style={{ fontFamily: 'JetBrains Mono,monospace', fontSize: 11, fontWeight: 700, color: '#FF9F0A', textTransform: 'uppercase', letterSpacing: '0.06em' }}>Original DFA</div>
                  <div style={{ fontFamily: 'JetBrains Mono,monospace', fontSize: 9, color: '#6E6E73', marginTop: 2 }}>{dfa.states.length} states</div>
                </div>
                {curOrigState && curOrigState.state && (
                  <div style={{ fontFamily: 'JetBrains Mono,monospace', fontSize: 12, fontWeight: 700, color: '#FF9F0A', background: 'rgba(255,159,10,.08)', border: '1.5px solid rgba(255,159,10,.3)', borderRadius: 8, padding: '5px 12px' }}>
                    {curOrigState.state}
                  </div>
                )}
              </div>
              <ForceGraph dfa={dfa} highlightStates={origHL} height={260} />
              <PathChips sim={origSim} stepIdx={stepIdx} color="#FF9F0A" />
              {bothDone && origSim && (
                <div className={`sim-result ${origSim.accepted ? 'accepted' : 'rejected'}`} style={{ marginTop: 10 }}>
                  {origSim.accepted ? '✓ ACCEPTED' : '✗ REJECTED'}
                </div>
              )}
            </div>

            {/* Minimized */}
            <div className="sim-track-card" style={{ borderTop: '3px solid #0071E3' }}>
              <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 12 }}>
                <div>
                  <div style={{ fontFamily: 'JetBrains Mono,monospace', fontSize: 11, fontWeight: 700, color: '#0071E3', textTransform: 'uppercase', letterSpacing: '0.06em' }}>Minimized DFA</div>
                  <div style={{ fontFamily: 'JetBrains Mono,monospace', fontSize: 9, color: '#6E6E73', marginTop: 2 }}>
                    {minResult ? `${minResult.minDFA.states.length} states` : 'run minimization first'}
                  </div>
                </div>
                {curMinState && curMinState.state && (
                  <div style={{ fontFamily: 'JetBrains Mono,monospace', fontSize: 12, fontWeight: 700, color: '#0071E3', background: 'rgba(0,113,227,.08)', border: '1.5px solid rgba(0,113,227,.3)', borderRadius: 8, padding: '5px 12px' }}>
                    {curMinState.state}
                  </div>
                )}
              </div>
              {minResult
                ? <ForceGraph dfa={minResult.minDFA} highlightStates={minHL} height={260} />
                : <div style={{ height: 260, display: 'flex', alignItems: 'center', justifyContent: 'center', background: '#F5F5F7', borderRadius: 12, border: '1px solid #D2D2D7' }}>
                  <p style={{ fontFamily: 'JetBrains Mono,monospace', fontSize: 12, color: '#C7C7CC', textAlign: 'center' }}>Minimize on tab ②<br />to enable dual-sim</p>
                </div>
              }
              <PathChips sim={minSim} stepIdx={stepIdx} color="#0071E3" />
              {bothDone && minSim && (
                <div className={`sim-result ${minSim.accepted ? 'accepted' : 'rejected'}`} style={{ marginTop: 10 }}>
                  {minSim.accepted ? '✓ ACCEPTED' : '✗ REJECTED'}
                </div>
              )}
            </div>
          </div>

          {/* Visual proof banner */}
          {bothDone && agree && (
            <div style={{ background: 'linear-gradient(135deg,rgba(48,209,88,.08),rgba(0,113,227,.08))', border: '1.5px solid rgba(48,209,88,.4)', borderRadius: 16, padding: '16px 24px', display: 'flex', alignItems: 'center', gap: 16 }}>
              <div style={{ fontSize: 28 }}>✓</div>
              <div>
                <div style={{ fontFamily: 'JetBrains Mono,monospace', fontSize: 13, fontWeight: 700, color: '#1a8a3a', marginBottom: 4 }}>
                  Visual Proof — Both DFAs {origSim.accepted ? 'ACCEPTED' : 'REJECTED'} ✓
                </div>
                <div style={{ fontFamily: 'JetBrains Mono,monospace', fontSize: 10, color: '#6E6E73' }}>
                  Despite having fewer states, the minimized DFA reaches the same conclusion as the original — proving equivalence.
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    function PathChips({ sim, stepIdx, color }) {
      if (!sim) return null;
      const visible = stepIdx >= 0 ? sim.path.slice(0, stepIdx + 1) : [];
      return (
        <div style={{ display: 'flex', flexWrap: 'wrap', alignItems: 'center', gap: 4, marginTop: 10, minHeight: 32 }}>
          {visible.length === 0 && <span style={{ fontFamily: 'JetBrains Mono,monospace', fontSize: 10, color: '#C7C7CC' }}>Path appears here…</span>}
          {visible.map((step, i) => (
            <React.Fragment key={i}>
              {i > 0 && (
                <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 1 }}>
                  <span style={{ fontFamily: 'JetBrains Mono,monospace', fontSize: 9, color: '#5E5CE6' }}>{step.sym}</span>
                  <span style={{ fontFamily: 'JetBrains Mono,monospace', fontSize: 9, color: '#C7C7CC' }}>→</span>
                </div>
              )}
              {step.undefined
                ? <div className="sim-node dead-node" style={{ fontSize: '0.7rem', padding: '3px 8px' }}>∅</div>
                : <div className={`sim-node ${i === visible.length - 1 ? 'active' : ''}`}
                  style={{ fontSize: '0.7rem', padding: '3px 8px', borderColor: i === visible.length - 1 ? color : '#D2D2D7', color: i === visible.length - 1 ? color : '#6E6E73' }}>
                  {step.state}
                </div>
              }
            </React.Fragment>
          ))}
        </div>
      );
    }

    /* ═══════════════════════════════
       FEATURES SECTION
    ═══════════════════════════════ */
    const FEATURES = [
      { icon: '∂', title: 'Table-Filling Algorithm', desc: 'Visualize the Myhill-Nerode table-filling method step by step. Watch each pair get marked as distinguishable in real time.', color: '#0071E3' },
      { icon: '⊂', title: 'Force-Directed Graphs', desc: 'Drag states, stretch transitions like rubber bands. Physics-based layouts make DFA structure immediately intuitive.', color: '#5E5CE6' },

    ];

          gsap.fromTo(card, { opacity: 0, y: 50 + i * 10 }, { opacity: 1, y: 0, duration: .8, delay: i * .12, ease: 'power3.out', scrollTrigger: { trigger: card, start: 'top 88%', toggleActions: 'play none none reverse' } });
          gsap.to(card, { y: -20 * (i * .5 + .4), ease: 'none', scrollTrigger: { trigger: sectionRef.current, start: 'top bottom', end: 'bottom top', scrub: 1.2 } });

        <section ref={sectionRef} className="py-24 px-6 max-w-6xl mx-auto">

            <h2 className="text-3xl font-bold text-[#1D1D1F] tracking-tight">Built for understanding automata theory</h2>
          </div>
          <div className="grid gap-6" style={{ gridTemplateColumns: 'repeat(3,1fr)' }}>
            {FEATURES.map((f, i) => (
              <div key={i} ref={el => cardsRef.current[i] = el}
                className="feature-card bg-white rounded-2xl p-7 shadow-card border border-[#D2D2D7]"
                style={{ borderTop: `3px solid ${f.color}`, opacity: 0 }}>
                <div className="text-3xl mb-5 font-mono" style={{ color: f.color }}>{f.icon}</div>
                <h3 className="text-base font-bold text-[#1D1D1F] mb-2">{f.title}</h3>
                <p className="text-sm text-[#6E6E73] leading-relaxed">{f.desc}</p>
              </div>
            ))}
          </div>
        </section>
      );

       TOAST

    /* ═══════════════════════════════
       THEME SELECTOR
