<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DFA Minimizer — Myhill-Nerode Visualizer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link
    href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400&family=JetBrains+Mono:wght@400;500;700&display=swap"
    rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            apple: {
              blue: '#0071E3', dark: '#1D1D1F', gray: '#F5F5F7', gray2: '#E8E8ED',
              muted: '#6E6E73', border: '#D2D2D7', green: '#30D158', red: '#FF453A',
              orange: '#FF9F0A', indigo: '#5E5CE6',
            }
          },
          fontFamily: {
            sans: ['"Plus Jakarta Sans"', 'system-ui', '-apple-system', 'sans-serif'],
            mono: ['"JetBrains Mono"', 'monospace'],
          },
          animation: {
            'fade-up': 'fadeUp 0.7s cubic-bezier(0.16,1,0.3,1) forwards',
            'fade-in': 'fadeIn 0.4s ease forwards',
            'tab-in': 'tabIn 0.35s cubic-bezier(0.16,1,0.3,1) forwards',
            'toast-in': 'toastIn 0.5s cubic-bezier(0.16,1,0.3,1) forwards',
            'slide-in': 'slideIn 0.3s cubic-bezier(0.16,1,0.3,1) forwards',
          },
          keyframes: {
            fadeUp: { '0%': { opacity: '0', transform: 'translateY(20px)' }, '100%': { opacity: '1', transform: 'translateY(0)' } },
            fadeIn: { '0%': { opacity: '0' }, '100%': { opacity: '1' } },
            tabIn: { '0%': { opacity: '0', transform: 'translateY(10px)' }, '100%': { opacity: '1', transform: 'translateY(0)' } },
            toastIn: { '0%': { opacity: '0', transform: 'translateX(-50%) translateY(16px)' }, '100%': { opacity: '1', transform: 'translateX(-50%) translateY(0)' } },
            slideIn: { '0%': { opacity: '0', transform: 'translateX(20px)' }, '100%': { opacity: '1', transform: 'translateX(0)' } },
          },
          boxShadow: {
            card: '0 1px 4px rgba(0,0,0,0.04), 0 4px 24px rgba(0,0,0,0.06)',
            btn: '0 2px 8px rgba(0,113,227,0.28)',
          }
        }
      }
    }
  </script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.9.0/d3.min.js"></script>

  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0
    }

    body {
      font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
      background: #F5F5F7;
      color: #1D1D1F;
      overflow-x: hidden
    }

    ::-webkit-scrollbar {
      width: 6px;
      height: 6px
    }

    ::-webkit-scrollbar-track {
      background: #F5F5F7
    }

    ::-webkit-scrollbar-thumb {
      background: #D2D2D7;
      border-radius: 3px
    }

    .mono-input {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.77rem;
      background: #F5F5F7;
      color: #1D1D1F;
      border: 1.5px solid #D2D2D7;
      border-radius: 10px;
      padding: 10px 13px;
      width: 100%;
      outline: none;
      transition: border-color .2s, box-shadow .2s, background .2s;
      resize: vertical
    }

    .mono-input:focus {
      border-color: #0071E3;
      background: #fff;
      box-shadow: 0 0 0 3px rgba(0, 113, 227, .1)
    }

    .dfa-table {
      width: 100%;
      border-collapse: collapse;
      font-family: 'JetBrains Mono', monospace;
      font-size: .74rem
    }

    .dfa-table th {
      background: #F5F5F7;
      color: #6E6E73;
      padding: 8px 14px;
      text-align: center;
      border: 1px solid #D2D2D7;
      font-weight: 600;
      letter-spacing: .04em
    }

    .dfa-table td {
      padding: 7px 14px;
      text-align: center;
      border: 1px solid #D2D2D7;
      color: #1D1D1F;
      background: #fff;
      transition: background .15s
    }

    .dfa-table tr:hover td {
      background: #F5F5F7
    }

    .dfa-table td.cell-start {
      color: #FF9F0A;
      font-weight: 600
    }

    .dfa-table td.cell-accept {
      color: #30D158;
      font-weight: 700
    }

    .dfa-table td.cell-both {
      color: #30D158;
      font-weight: 700;
      background: rgba(48, 209, 88, .05)
    }

    .mn-table {
      border-collapse: collapse;
      font-family: 'JetBrains Mono', monospace;
      font-size: .73rem;
      margin: 0 auto
    }

    .mn-table thead th {
      color: #6E6E73;
      padding: 4px 0;
      text-align: center;
      font-weight: 600;
      min-width: 44px
    }

    .mn-table tbody th {
      color: #6E6E73;
      font-weight: 600;
      padding: 0 10px 0 0;
      text-align: right
    }

    .mn-cell {
      width: 44px;
      height: 44px;
      text-align: center;
      vertical-align: middle;
      border: 1px solid #D2D2D7;
      background: #F5F5F7;
      font-size: 1.1rem;
      transition: background .35s cubic-bezier(.4, 0, .2, 1), color .35s, border-color .35s, transform .25s, box-shadow .25s
    }

    .mn-cell.marked {
      color: #30D158;
      background: #f0fdf4
    }

    .mn-cell.newly-marked {
      color: #30D158;
      background: #dcfce7;
      border-color: #86efac
    }

    .mn-cell.checking {
      color: #0071E3;
      background: rgba(0, 113, 227, .10);
      border-color: #0071E3;
      border-width: 2px;
      transform: scale(1.18);
      box-shadow: 0 0 0 3px rgba(0, 113, 227, .18), 0 4px 16px rgba(0, 113, 227, .15);
      z-index: 10;
      position: relative
    }

    .mn-cell.checking-marked {
      color: #FF9F0A;
      background: rgba(255, 159, 10, .12);
      border-color: #FF9F0A;
      border-width: 2px;
      transform: scale(1.18);
      box-shadow: 0 0 0 3px rgba(255, 159, 10, .2), 0 4px 16px rgba(255, 159, 10, .15);
      z-index: 10;
      position: relative
    }

    .mn-cell.unmarked {
      color: transparent;
      background: #fff
    }

    .mn-cell.empty {
      border: none;
      background: transparent
    }

    /* Speed slider */
    .speed-track {
      -webkit-appearance: none;
      appearance: none;
      width: 100%;
      height: 5px;
      border-radius: 99px;
      background: linear-gradient(90deg, #0071E3 var(--fill, 50%), #E8E8ED var(--fill, 50%));
      outline: none;
      cursor: pointer
    }

    .speed-track::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: #fff;
      border: none;
      box-shadow: 0 2px 8px rgba(0, 0, 0, .22), 0 0 0 1.5px rgba(0, 0, 0, .08);
      cursor: pointer;
      transition: transform .15s, box-shadow .15s
    }

    .speed-track::-webkit-slider-thumb:hover {
      transform: scale(1.12);
      box-shadow: 0 4px 12px rgba(0, 0, 0, .28), 0 0 0 2px rgba(0, 113, 227, .25)
    }

    .speed-track::-moz-range-thumb {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: #fff;
      border: none;
      box-shadow: 0 2px 8px rgba(0, 0, 0, .22);
      cursor: pointer
    }

    /* Explanation card */
    @keyframes explainIn {
      0% {
        opacity: 0;
        transform: translateY(6px)
      }

      100% {
        opacity: 1;
        transform: translateY(0)
      }
    }

    .explain-card {
      animation: explainIn .28s cubic-bezier(.16, 1, .3, 1) forwards
    }

    /* Progress bar */
    @keyframes progFill {
      from {
        width: 0
      }

      to {
        width: var(--prog-w)
      }
    }

    .prog-fill {
      transition: width .35s cubic-bezier(.4, 0, .2, 1)
    }

    /* Play button glow */
    @keyframes playGlow {

      0%,
      100% {
        box-shadow: 0 2px 8px rgba(0, 113, 227, .3)
      }

      50% {
        box-shadow: 0 4px 24px rgba(0, 113, 227, .55)
      }
    }

    .play-btn-active {
      animation: playGlow 1.6s ease-in-out infinite
    }

    .log-entry {
      font-family: 'JetBrains Mono', monospace;
      font-size: .7rem;
      line-height: 1.6;
      padding: 8px 12px;
      background: #F5F5F7;
      border-radius: 8px;
      border-left: 3px solid #D2D2D7;
      color: #6E6E73;
      transition: all .3s
    }

    .log-entry.active-type {
      border-left-color: #0071E3;
      color: #1D1D1F;
      background: rgba(0, 113, 227, .04)
    }

    .log-entry.split-type {
      border-left-color: #FF9F0A;
      color: #c47a00;
      background: rgba(255, 159, 10, .04)
    }

    .log-entry.done-type {
      border-left-color: #30D158;
      color: #1a8a3a;
      background: rgba(48, 209, 88, .04)
    }

    .sim-node {
      font-family: 'JetBrains Mono', monospace;
      font-size: .78rem;
      background: #F5F5F7;
      border: 1.5px solid #D2D2D7;
      border-radius: 8px;
      padding: 5px 12px;
      color: #1D1D1F;
      transition: all .25s
    }

    .sim-node.active {
      background: rgba(0, 113, 227, .08);
      border-color: #0071E3;
      color: #0071E3;
      box-shadow: 0 0 0 3px rgba(0, 113, 227, .08)
    }

    .sim-node.dead-node {
      background: rgba(255, 69, 58, .07);
      border-color: #FF453A;
      color: #FF453A
    }

    .sim-result {
      margin-top: 14px;
      font-family: 'JetBrains Mono', monospace;
      font-size: .9rem;
      font-weight: 700;
      padding: 10px 18px;
      border-radius: 10px;
      display: inline-block
    }

    .sim-result.accepted {
      background: rgba(48, 209, 88, .1);
      color: #1a8a3a;
      border: 1.5px solid #30D158
    }

    .sim-result.rejected {
      background: rgba(255, 69, 58, .08);
      color: #FF453A;
      border: 1.5px solid #FF453A
    }

    .stat-box {
      background: #F5F5F7;
      border: 1px solid #D2D2D7;
      border-radius: 14px;
      padding: 16px 18px;
      text-align: center
    }

    .stat-val {
      font-family: 'JetBrains Mono', monospace;
      font-size: 1.7rem;
      font-weight: 700;
      color: #0071E3;
      display: block
    }

    .stat-label {
      font-family: 'JetBrains Mono', monospace;
      font-size: .6rem;
      color: #6E6E73;
      text-transform: uppercase;
      letter-spacing: .08em;
      margin-top: 4px
    }

    .stat-box.reduction .stat-val {
      color: #30D158
    }

    .stat-box.no-reduction .stat-val {
      color: #FF9F0A
    }

    .mn-equiv-class {
      background: rgba(0, 113, 227, .07);
      border: 1px solid rgba(0, 113, 227, .25);
      border-radius: 8px;
      padding: 4px 12px;
      font-family: 'JetBrains Mono', monospace;
      font-size: .7rem;
      color: #0071E3
    }

    .error-box {
      background: rgba(255, 69, 58, .06);
      border: 1px solid rgba(255, 69, 58, .25);
      border-radius: 10px;
      padding: 10px 14px;
      font-family: 'JetBrains Mono', monospace;
      font-size: .72rem;
      color: #FF453A;
      white-space: pre-wrap;
      line-height: 1.6
    }

    .gradient-text {
      background: linear-gradient(135deg, #1D1D1F 0%, #3a3a3c 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text
    }

    .hero-gradient {
      background: radial-gradient(ellipse 80% 60% at 50% -10%, rgba(0, 113, 227, .1) 0%, transparent 70%)
    }

    .feature-card {
      will-change: transform;
      transition: box-shadow .3s, transform .3s
    }

    .feature-card:hover {
      box-shadow: 0 8px 40px rgba(0, 0, 0, .1);
      transform: translateY(-3px)
    }

    .glass-header {
      background: rgba(255, 255, 255, .85);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px)
    }

    /* Glass sidebar */
    .glass-sidebar {
      background: rgba(255, 255, 255, .72);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid rgba(255, 255, 255, .9);
      box-shadow: 0 8px 32px rgba(0, 0, 0, .08), inset 0 1px 0 rgba(255, 255, 255, .8)
    }

    /* Status light */
    @keyframes pulse-green {

      0%,
      100% {
        box-shadow: 0 0 0 0 rgba(48, 209, 88, .5)
      }

      50% {
        box-shadow: 0 0 0 5px rgba(48, 209, 88, 0)
      }
    }

    @keyframes pulse-orange {

      0%,
      100% {
        box-shadow: 0 0 0 0 rgba(255, 159, 10, .5)
      }

      50% {
        box-shadow: 0 0 0 5px rgba(255, 159, 10, 0)
      }
    }

    @keyframes pulse-red {

      0%,
      100% {
        box-shadow: 0 0 0 0 rgba(255, 69, 58, .5)
      }

      50% {
        box-shadow: 0 0 0 5px rgba(255, 69, 58, 0)
      }
    }

    .light-green {
      animation: pulse-green 2s ease-in-out infinite;
      background: #30D158
    }

    .light-orange {
      animation: pulse-orange 2s ease-in-out infinite;
      background: #FF9F0A
    }

    .light-red {
      animation: pulse-red 2s ease-in-out infinite;
      background: #FF453A
    }

    .light-gray {
      background: #D2D2D7
    }

    /* Export modal */
    .export-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, .45);
      backdrop-filter: blur(4px);
      z-index: 1000;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px
    }

    .export-modal {
      background: #fff;
      border-radius: 20px;
      width: 100%;
      max-width: 720px;
      max-height: 85vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      box-shadow: 0 24px 80px rgba(0, 0, 0, .25)
    }

    .export-tab-btn {
      font-family: 'JetBrains Mono', monospace;
      font-size: .72rem;
      padding: 10px 18px;
      border: none;
      background: none;
      cursor: pointer;
      color: #6E6E73;
      border-bottom: 2px solid transparent;
      transition: all .2s;
      white-space: nowrap
    }

    .export-tab-btn.active {
      color: #0071E3;
      border-bottom-color: #0071E3;
      font-weight: 600
    }

    .code-block {
      background: #1D1D1F;
      color: #d4d4d4;
      font-family: 'JetBrains Mono', monospace;
      font-size: .72rem;
      padding: 20px;
      border-radius: 0;
      overflow: auto;
      white-space: pre;
      line-height: 1.75;
      flex: 1;
      min-height: 0
    }

    .code-block .kw {
      color: #c792ea
    }

    .code-block .st {
      color: #c3e88d
    }

    .code-block .cm {
      color: #546e7a;
      font-style: italic
    }

    .code-block .nb {
      color: #82aaff
    }

    .code-block .fn {
      color: #82aaff
    }

    .code-block .nu {
      color: #f78c6c
    }

    /* Live preview mini card */
    .live-preview {
      background: linear-gradient(135deg, rgba(0, 113, 227, .05) 0%, rgba(48, 209, 88, .05) 100%);
      border: 1.5px solid rgba(0, 113, 227, .2);
      border-radius: 14px;
      padding: 14px 16px;
      transition: all .3s
    }

    /* Force graph */
    .force-graph-container {
      border-radius: 12px;
      border: 1px solid #D2D2D7;
      overflow: hidden;
      background: #fff;
      cursor: grab;
      position: relative
    }

    .force-graph-container:active {
      cursor: grabbing
    }

    /* ── DFA Diagram Giggle Physics CSS ─────────────────────────── */
    .force-graph-container g.node {
      transform-box: fill-box;
      transform-origin: center;
    }

    .force-graph-container g.node circle {
      transform-box: fill-box;
      transform-origin: center;
      will-change: r;
    }

    /* Blue glow on hover via drop-shadow */
    .force-graph-container circle.main-circle {
      filter: drop-shadow(0 0 0px rgba(0,113,227,0));
      transition: filter 0.35s ease;
    }

    .force-graph-container g.node:hover circle.main-circle {
      filter: drop-shadow(0 0 9px rgba(0,113,227,0.38));
    }

    /* Dual sim */
    .sim-track-card {
      background: #fff;
      border-radius: 18px;
      padding: 18px;
      box-shadow: 0 1px 4px rgba(0, 0, 0, .04), 0 4px 24px rgba(0, 0, 0, .06);
      border: 1px solid #D2D2D7
    }

    /* State step chip */
    @keyframes chipPulse {

      0%,
      100% {
        box-shadow: 0 0 0 0 rgba(0, 113, 227, .3)
      }

      50% {
        box-shadow: 0 0 0 6px rgba(0, 113, 227, 0)
      }
    }

    .chip-active {
      animation: chipPulse 1s ease-in-out infinite
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: 1
      }

      50% {
        opacity: .45
      }
    }

    @media(max-width:900px) {
      .app-body {
        flex-direction: column !important
      }

      .glass-sidebar {
        width: 100% !important;
        position: static !important
      }

      .grid-2col {
        grid-template-columns: 1fr !important
      }

      .grid-builder {
        grid-template-columns: 1fr !important
      }
    }
  </style>
</head>

<body>
  <div id="root"></div>

  <script type="text/babel">
    gsap.registerPlugin(ScrollTrigger);
    const { useState, useEffect, useRef, useCallback, useMemo } = React;

    const esc = s => String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');

    /* ═══════════════════════════════
       DFA EXAMPLES
    ═══════════════════════════════ */
    const DFA_EXAMPLES = [
      {
        name: 'Ends with 0  [4→2 states]', desc: 'Accepts binary strings ending in 0.',
        states: 'q0,q1,q2,q3', alpha: '0,1', start: 'q0', accept: 'q2,q3',
        trans: 'q0,0->q2\nq0,1->q1\nq1,0->q3\nq1,1->q0\nq2,0->q3\nq2,1->q1\nq3,0->q2\nq3,1->q0'
      },
      {
        name: 'Even 0s — redundant  [4→2 states]', desc: 'Even-zero counter with duplicated state pairs.',
        states: 'q0,q1,q2,q3', alpha: '0,1', start: 'q0', accept: 'q0,q1',
        trans: 'q0,0->q2\nq0,1->q1\nq1,0->q3\nq1,1->q0\nq2,0->q0\nq2,1->q3\nq3,0->q1\nq3,1->q2'
      },
      {
        name: 'Even-length strings  [4→2 states]', desc: 'Accepts strings over {0,1} with even length.',
        states: 'q0,q1,q2,q3', alpha: '0,1', start: 'q0', accept: 'q0,q1',
        trans: 'q0,0->q2\nq0,1->q3\nq1,0->q3\nq1,1->q2\nq2,0->q0\nq2,1->q1\nq3,0->q1\nq3,1->q0'
      },
      {
        name: 'Classic minimisation  [6→3 states]', desc: 'Textbook 6-state DFA.',
        states: 'q0,q1,q2,q3,q4,q5', alpha: '0,1', start: 'q0', accept: 'q2,q4',
        trans: 'q0,0->q1\nq0,1->q2\nq1,0->q3\nq1,1->q4\nq2,0->q4\nq2,1->q3\nq3,0->q5\nq3,1->q5\nq4,0->q5\nq4,1->q5\nq5,0->q5\nq5,1->q5'
      },
      {
        name: 'Length ÷ 3  [6→3 states]', desc: 'Counts string length mod 3 over {a,b}.',
        states: 'q0,q1,q2,q3,q4,q5', alpha: 'a,b', start: 'q0', accept: 'q0,q1',
        trans: 'q0,a->q2\nq0,b->q3\nq1,a->q3\nq1,b->q2\nq2,a->q4\nq2,b->q5\nq3,a->q5\nq3,b->q4\nq4,a->q0\nq4,b->q1\nq5,a->q1\nq5,b->q0'
      },
      {
        name: 'Length ÷ 4  [8→4 states]', desc: 'Counts string length mod 4 over {0,1}.',
        states: 'q0,q1,q2,q3,q4,q5,q6,q7', alpha: '0,1', start: 'q0', accept: 'q0,q1',
        trans: 'q0,0->q2\nq0,1->q3\nq1,0->q3\nq1,1->q2\nq2,0->q4\nq2,1->q5\nq3,0->q5\nq3,1->q4\nq4,0->q6\nq4,1->q7\nq5,0->q7\nq5,1->q6\nq6,0->q0\nq6,1->q1\nq7,0->q1\nq7,1->q0'
      },
    ];

    /* ═══════════════════════════════
       DFA LOGIC
    ═══════════════════════════════ */
    function parseDFA(rs, ra, rst, racc, rt) {
      const states = rs.split(',').map(s => s.trim()).filter(Boolean);
      const alphabet = ra.split(',').map(s => s.trim()).filter(Boolean);
      const start = rst.trim();
      const accept = racc.split(',').map(s => s.trim()).filter(Boolean);
      const errors = [];
      if (!states.length) errors.push('States list is empty.');
      if (!alphabet.length) errors.push('Alphabet is empty.');
      if (!start) errors.push('Start state is missing.');
      if (start && !states.includes(start)) errors.push(`Start state "${start}" not in states.`);
      accept.forEach(a => { if (!states.includes(a)) errors.push(`Accept state "${a}" not in states.`); });
      const delta = {};
      states.forEach(s => { delta[s] = {}; });
      rt.split('\n').forEach((line, i) => {
        line = line.trim(); if (!line) return;
        const m = line.match(/^(.+),(.+)->(.*)$/) || line.match(/^(.+),(.+)→(.*)$/);
        if (!m) { errors.push(`Line ${i + 1}: bad format "${line}" — use state,symbol->next`); return; }
        const [, from, sym, to] = m.map(x => x.trim());
        if (!states.includes(from)) { errors.push(`Line ${i + 1}: unknown state "${from}"`); return; }
        if (!alphabet.includes(sym)) { errors.push(`Line ${i + 1}: symbol "${sym}" not in alphabet`); return; }
        if (!to) { errors.push(`Line ${i + 1}: missing destination state for δ(${from},${sym})`); return; }
        if (!states.includes(to)) { errors.push(`Line ${i + 1}: unknown state "${to}"`); return; }
        delta[from][sym] = to;
      });
      states.forEach(s => alphabet.forEach(sym => { if (!delta[s][sym]) errors.push(`Missing: δ(${s},${sym})`); }));
      if (errors.length) throw new Error(errors.join('\n'));
      return { states, alphabet, start, accept: new Set(accept), delta, trans(s, sym) { return (this.delta[s] || {})[sym] || null; } };
    }

    function minimizeDFA(dfa) {
      const { states } = dfa, n = states.length;
      const steps = [];
      const pairKey = (a, b) => { const ia = states.indexOf(a), ib = states.indexOf(b); return ia < ib ? `${ia},${ib}` : `${ib},${ia}`; };
      const initMarked = {};
      for (let i = 0; i < n; i++) for (let j = i + 1; j < n; j++) initMarked[`${i},${j}`] = false;
      steps.push({ type: 'init', marked: { ...initMarked }, newlyMarked: [], logMsg: `Initialize: ${Object.keys(initMarked).length} pairs — all unmarked.`, logType: 'active', round: 0 });
      const m1 = { ...initMarked }, baseMarked = [];
      for (let i = 0; i < n; i++) for (let j = i + 1; j < n; j++)
        if (dfa.accept.has(states[i]) !== dfa.accept.has(states[j])) { m1[`${i},${j}`] = true; baseMarked.push(`${i},${j}`); }
      steps.push({
        type: 'base', marked: { ...m1 }, newlyMarked: baseMarked,
        logMsg: `Base case — accept vs non-accept: ${baseMarked.length ? baseMarked.map(k => { const [i, j] = k.split(','); return `(${states[i]},${states[j]})` }).join(', ') : 'none'}`,
        logType: 'split', round: 1
      });
      let cur = { ...m1 }, roundNum = 2, changed = true;
      while (changed) {
        changed = false; const next = { ...cur }, newlyMarked = [];
        for (let i = 0; i < n; i++) for (let j = i + 1; j < n; j++) {
          const key = `${i},${j}`; if (cur[key]) continue;
          const si = states[i], sj = states[j];
          for (const sym of dfa.alphabet) {
            const ti = dfa.trans(si, sym), tj = dfa.trans(sj, sym);
            if (!ti || !tj || ti === tj) continue;
            if (cur[pairKey(ti, tj)]) { next[key] = true; newlyMarked.push(key); changed = true; break; }
          }
        }
        cur = next;
        if (changed) steps.push({
          type: 'iter', marked: { ...cur }, newlyMarked: [...newlyMarked],
          logMsg: `Round ${roundNum}: marked ${newlyMarked.length} new pair(s): ${newlyMarked.map(k => { const [i, j] = k.split(','); return `(${states[i]},${states[j]})` }).join(', ')}`,
          logType: 'split', round: roundNum
        });
        else steps.push({ type: 'done', marked: { ...cur }, newlyMarked: [], logMsg: `Round ${roundNum}: no new pairs — algorithm complete!`, logType: 'done', round: roundNum });
        roundNum++;
      }
      const parent = {};
      states.forEach(s => parent[s] = s);
      const find = s => parent[s] === s ? s : (parent[s] = find(parent[s]));
      const union = (a, b) => { parent[find(a)] = find(b); };
      for (let i = 0; i < n; i++) for (let j = i + 1; j < n; j++) if (!cur[`${i},${j}`]) union(states[i], states[j]);
      const classMap = {};
      states.forEach(s => { const r = find(s); if (!classMap[r]) classMap[r] = []; classMap[r].push(s); });
      const finalPartitions = Object.values(classMap);
      const rep = {};
      finalPartitions.forEach((g, i) => g.forEach(s => { rep[s] = `M${i}`; }));
      const minStates = finalPartitions.map((_, i) => `M${i}`);
      const minAccept = new Set();
      finalPartitions.forEach((g, i) => { if (g.some(s => dfa.accept.has(s))) minAccept.add(`M${i}`); });
      const minDelta = {};
      minStates.forEach(ms => { minDelta[ms] = {}; });
      finalPartitions.forEach((g, i) => { const s = g[0]; dfa.alphabet.forEach(sym => { const nx = dfa.trans(s, sym); if (nx) minDelta[`M${i}`][sym] = rep[nx]; }); });
      const labelMap = {};
      finalPartitions.forEach((g, i) => { labelMap[`M${i}`] = g; });
      const minDFA = { states: minStates, alphabet: dfa.alphabet, start: rep[dfa.start], accept: minAccept, delta: minDelta, labelMap, trans(s, sym) { return (this.delta[s] || {})[sym] || null; } };
      return { steps, finalPartitions, minDFA };
    }

    function simulateDFA(dfa, input) {
      const chars = input === '' ? [] : input.split('');
      let state = dfa.start;
      const path = [{ state, sym: null }], log = [];
      for (let i = 0; i < chars.length; i++) {
        const sym = chars[i], next = dfa.trans(state, sym);
        if (!next) { log.push(`δ(${state}, ${sym}) = ∅ ← undefined (rejected)`); path.push({ state: null, sym, undefined: true }); return { path, accepted: false, log, stuck: true }; }
        log.push(`δ(${state}, ${sym}) = ${next}`); state = next; path.push({ state, sym });
      }
      const accepted = dfa.accept.has ? dfa.accept.has(state) : [...dfa.accept].includes(state);
      log.push(`Final: ${state} — ${accepted ? '✓ ACCEPTED' : '✗ REJECTED'}`);
      return { path, accepted, log, stuck: false };
    }

    /* ═══════════════════════════════
       FORCE GRAPH (D3)
    ═══════════════════════════════ */
    const GROUP_COLORS = ['#0071E3', '#30D158', '#FF9F0A', '#5E5CE6', '#FF453A', '#32ADE6', '#BF5AF2'];

    function ForceGraph({ dfa, highlightStates = new Set(), groupColorMap = null, height = 360, meltGroups = null, onMeltDone }) {
      const containerRef = useRef(null);
      const simRef = useRef(null);
      const nodesRef = useRef([]);
      const nodeByIdRef = useRef({});
      const svgRef = useRef(null);

      // Re-build when dfa changes
      useEffect(() => {
        if (!dfa || !containerRef.current) return;
        const el = containerRef.current;
        // Cleanup old SVG
        d3.select(el).selectAll('svg').remove();
        if (simRef.current) simRef.current.stop();

        const W = el.clientWidth || 600;
        const H = height;
        const R = 24;

        // Calculate BFS depths for directional layout
        const depth = { [dfa.start]: 0 };
        const queue = [dfa.start];
        while (queue.length) {
          const curr = queue.shift();
          dfa.alphabet.forEach(sym => {
            const to = dfa.trans ? dfa.trans(curr, sym) : null;
            if (to && depth[to] === undefined) {
              depth[to] = depth[curr] + 1;
              queue.push(to);
            }
          });
        }
        let maxDepth = 0;
        dfa.states.forEach(id => {
          if (depth[id] === undefined) depth[id] = 0; // fallback for unreachable states
          if (depth[id] > maxDepth) maxDepth = depth[id];
        });

        // Initialize nodes with horizontal spacing
        const nodes = dfa.states.map((id, i) => {
          const d = depth[id];
          return {
            id,
            x: maxDepth > 0 ? 80 + (W - 160) * (d / maxDepth) : W / 2,
            y: H / 2 + (Math.random() - 0.5) * 40 // slight vertical scatter
          };
        });

        const nodeById = {};
        nodes.forEach(n => { nodeById[n.id] = n; });
        nodesRef.current = nodes;
        nodeByIdRef.current = nodeById;

        // Build edges
        const edgeMap = {};
        dfa.states.forEach(from => {
          dfa.alphabet.forEach(sym => {
            const to = dfa.trans ? dfa.trans(from, sym) : null;
            if (!to) return;
            const key = from === to ? `__self__${from}` : `${from}→${to}`;
            if (!edgeMap[key]) edgeMap[key] = { from, to, syms: [], isSelf: from === to };
            edgeMap[key].syms.push(sym);
          });
        });
        const allEdges = Object.values(edgeMap);
        const bidirSet = new Set();
        allEdges.forEach(e => { if (!e.isSelf && edgeMap[`${e.to}→${e.from}`]) bidirSet.add(`${e.from}→${e.to}`); });

        // SVG
        const svg = d3.select(el).append('svg')
          .attr('width', '100%').attr('height', H)
          .style('display', 'block').style('background', '#fff');
        svgRef.current = svg;

        // Defs: arrow markers + glow filter
        const defs = svg.append('defs');
        ['default', 'active', 'accept'].forEach(t => {
          const color = t === 'active' ? '#0071E3' : t === 'accept' ? '#30D158' : '#9CA3AF';
          defs.append('marker').attr('id', `arrow-${t}`)
            .attr('viewBox', '0 -5 10 10').attr('refX', 10).attr('refY', 0)
            .attr('markerWidth', 6).attr('markerHeight', 6).attr('orient', 'auto')
            .append('path').attr('d', 'M0,-5L10,0L0,5').attr('fill', color);
        });
        defs.append('filter').attr('id', 'glow-blue')
          .append('feGaussianBlur').attr('stdDeviation', 4).attr('result', 'coloredBlur');

        const g = svg.append('g');

        // Zoom + pan
        svg.call(d3.zoom().scaleExtent([0.3, 3]).on('zoom', e => g.attr('transform', e.transform)));

        // Start arrow
        const startG = g.append('g').attr('class', 'start-arrow-g');
        startG.append('line').attr('class', 'start-line')
          .attr('stroke', '#6E6E73').attr('stroke-width', 1.5)
          .attr('marker-end', 'url(#arrow-default)');

        // Edge groups
        const edgeGs = g.append('g').attr('class', 'edges').selectAll('g.edge')
          .data(allEdges).enter().append('g').attr('class', 'edge');
        edgeGs.append('path').attr('class', 'edge-path').attr('fill', 'none')
          .attr('stroke', '#C7C7CC').attr('stroke-width', 1.5)
          .attr('marker-end', 'url(#arrow-default)');
        edgeGs.append('rect').attr('class', 'edge-label-bg')
          .attr('fill', 'rgba(255,255,255,0.9)').attr('rx', 3).attr('ry', 3);
        edgeGs.append('text').attr('class', 'edge-label')
          .text(d => d.syms.join(','))
          .attr('font-family', 'JetBrains Mono,monospace').attr('font-size', 10)
          .attr('font-weight', 'bold').attr('fill', '#6E6E73')
          .attr('text-anchor', 'middle').attr('dominant-baseline', 'middle');

        // Node groups
        const nodeGs = g.append('g').attr('class', 'nodes').selectAll('g.node')
          .data(nodes).enter().append('g').attr('class', 'node').attr('id', d => `nd-${d.id}`)
          .style('cursor', 'grab');

        nodeGs.each(function (d) {
          const ng = d3.select(this);
          const isAccept = dfa.accept.has ? dfa.accept.has(d.id) : [...dfa.accept].includes(d.id);
          if (isAccept) ng.append('circle').attr('class', 'accept-ring').attr('r', R + 6)
            .attr('fill', 'none').attr('stroke', '#1D1D1F').attr('stroke-width', 1.5);
          ng.append('circle').attr('class', 'main-circle').attr('r', R)
            .attr('fill', '#fff').attr('stroke', '#1D1D1F').attr('stroke-width', 2);
          ng.append('text').text(d.id)
            .attr('font-family', 'JetBrains Mono,monospace').attr('font-size', 11)
            .attr('font-weight', 'bold').attr('fill', '#1D1D1F')
            .attr('text-anchor', 'middle').attr('dominant-baseline', 'middle');
        });

        let internalTick;

        // ── Giggle Physics: Hover ──────────────────────────────────
        nodeGs
          .on('mouseenter', function (e, d) {
            const ng = d3.select(this);
            ng.style('cursor', 'grab');
            // Spring-expand the circle
            ng.select('.main-circle')
              .transition().duration(0).attr('r', R)
              .transition().duration(420)
              .ease(d3.easeElasticOut.amplitude(1.35).period(0.38))
              .attr('r', R * 1.22);
            ng.select('.accept-ring')
              .transition().duration(0).attr('r', R + 6)
              .transition().duration(420)
              .ease(d3.easeElasticOut.amplitude(1.35).period(0.38))
              .attr('r', (R + 6) * 1.22);
            // Tilt the label slightly
            ng.select('text')
              .transition().duration(200).ease(d3.easeBackOut)
              .attr('transform', 'rotate(7) scale(1.08)');
          })
          .on('mouseleave', function (e, d) {
            const ng = d3.select(this);
            ng.select('.main-circle')
              .transition().duration(500)
              .ease(d3.easeElasticOut.amplitude(1.1).period(0.42))
              .attr('r', R);
            ng.select('.accept-ring')
              .transition().duration(500)
              .ease(d3.easeElasticOut.amplitude(1.1).period(0.42))
              .attr('r', R + 6);
            ng.select('text')
              .transition().duration(350).ease(d3.easeElasticOut.amplitude(1.2).period(0.4))
              .attr('transform', 'rotate(0) scale(1)');
          })
          // ── Giggle Physics: Click ripple ─────────────────────────
          .on('click', function (e, d) {
            const ng = d3.select(this);
            // Squish
            ng.select('.main-circle')
              .transition().duration(70).attr('r', R * 0.82)
              .transition().duration(550)
              .ease(d3.easeElasticOut.amplitude(1.45).period(0.36))
              .attr('r', R);
            // Expanding ripple ring
            const ripple = ng.insert('circle', '.main-circle')
              .attr('r', R).attr('fill', 'none')
              .attr('stroke', '#0071E3').attr('stroke-width', 2.5)
              .attr('opacity', 0.75);
            ripple.transition().duration(650).ease(d3.easeQuadOut)
              .attr('r', R * 2.8).attr('opacity', 0)
              .on('end', function () { d3.select(this).remove(); });
          });

        // ── Giggle Physics: Spring Drag ────────────────────────────
        nodeGs.call(d3.drag()
          .on('start', (e, d) => {
            d.fx = d.x; d.fy = d.y;
            // Squish on grab
            d3.select(`#nd-${d.id}`).select('.main-circle')
              .transition().duration(120).ease(d3.easeBackIn.overshoot(2))
              .attr('r', R * 0.86);
          })
          .on('drag', (e, d) => {
            d.fx = e.x; d.fy = e.y;
            d.x = e.x; d.y = e.y;
            if (internalTick) internalTick();
          })
          .on('end', (e, d) => {
            d.fx = d.x; d.fy = d.y;
            // Spring release on drop
            d3.select(`#nd-${d.id}`).select('.main-circle')
              .transition().duration(0).attr('r', R * 0.86)
              .transition().duration(650)
              .ease(d3.easeElasticOut.amplitude(1.5).period(0.38))
              .attr('r', R);
            // Drop ripple
            const dropNg = d3.select(`#nd-${d.id}`);
            const dropRipple = dropNg.insert('circle', '.main-circle')
              .attr('r', R * 0.86).attr('fill', 'none')
              .attr('stroke', '#5E5CE6').attr('stroke-width', 2)
              .attr('opacity', 0.6);
            dropRipple.transition().duration(500).ease(d3.easeQuadOut)
              .attr('r', R * 2.2).attr('opacity', 0)
              .on('end', function () { d3.select(this).remove(); });
          })
        );

        // Force links (no self-loops)
        const simLinks = allEdges.filter(e => !e.isSelf).map(e => ({ source: e.from, target: e.to }));

        const sim = d3.forceSimulation(nodes)
          .force('link', d3.forceLink(simLinks).id(d => d.id).distance(80).strength(0.2))
          .force('charge', d3.forceManyBody().strength(-600))
          .force('y', d3.forceY(H / 2).strength(0.08)) // soft center pulling
          .force('x', d3.forceX(d => maxDepth > 0 ? 100 + (W - 200) * (depth[d.id] / maxDepth) : W / 2).strength(0.4))
          .force('collide', d3.forceCollide(60).strength(1))
          .on('tick', () => {
            if (internalTick) internalTick();
          });

        // Pre-compute 200 ticks to skip the bouncing animation entirely
        sim.alpha(1);
        for (let i = 0; i < 200; ++i) sim.tick();
        sim.stop(); // Keep it completely static

        internalTick = () => {
          // Clamp to bounds
          nodes.forEach(n => {
            n.x = Math.max(55, Math.min(W - 55, n.x));
            n.y = Math.max(55, Math.min(H - 55, n.y));
          });

          // Update nodes
          nodeGs.attr('transform', d => `translate(${d.x},${d.y})`);

          // Update start arrow
          const sn = nodeById[dfa.start];
          if (sn) {
            startG.select('.start-line')
              .attr('x1', sn.x - R - 38).attr('y1', sn.y)
              .attr('x2', sn.x - R - 2).attr('y2', sn.y);
          }

          // Update edges
          edgeGs.each(function (d) {
            const eg = d3.select(this);
            const src = nodeById[d.from], tgt = nodeById[d.to];
            if (!src || !tgt) return;

            let pathD, lx, ly;
            if (d.isSelf) {
              const x = src.x, y = src.y, yr = y - R;
              pathD = `M ${x - 10},${yr} C ${x - 65},${y - 88} ${x + 65},${y - 88} ${x + 10},${yr}`;
              lx = x; ly = y - R - 52;
            } else {
              const dx = tgt.x - src.x, dy = tgt.y - src.y;
              const dist = Math.sqrt(dx * dx + dy * dy) || 1;
              const ux = dx / dist, uy = dy / dist;
              const isBidir = bidirSet.has(`${d.from}→${d.to}`);
              if (isBidir) {
                const perp = 36, px = -uy * perp, py = ux * perp;
                const mx = (src.x + tgt.x) / 2 + px, my = (src.y + tgt.y) / 2 + py;
                const da = Math.sqrt((mx - src.x) ** 2 + (my - src.y) ** 2) || 1;
                const db = Math.sqrt((mx - tgt.x) ** 2 + (my - tgt.y) ** 2) || 1;
                const sx2 = src.x + R * (mx - src.x) / da, sy2 = src.y + R * (my - src.y) / da;
                const ex2 = tgt.x + R * (mx - tgt.x) / db, ey2 = tgt.y + R * (my - tgt.y) / db;
                pathD = `M ${sx2},${sy2} Q ${mx},${my} ${ex2},${ey2}`;
                lx = mx + px * 0.3; ly = my + py * 0.3;
              } else {
                const sx2 = src.x + R * ux, sy2 = src.y + R * uy;
                const ex2 = tgt.x - R * ux, ey2 = tgt.y - R * uy;
                pathD = `M ${sx2},${sy2} L ${ex2},${ey2}`;
                lx = (sx2 + ex2) / 2 - uy * 14; ly = (sy2 + ey2) / 2 + ux * 14;
              }
            }
            eg.select('.edge-path').attr('d', pathD);
            const lw = d.syms.join(',').length * 7 + 4;
            eg.select('.edge-label').attr('x', lx).attr('y', ly);
            eg.select('.edge-label-bg').attr('x', lx - lw / 2 - 3).attr('y', ly - 8).attr('width', lw + 6).attr('height', 16);
          });
        };

        // Expose tick logic to parent animations
        containerRef.current._tickDOM = internalTick;

        // Execute one manual draw step to cast the pre-computed headless state into the DOM!
        internalTick();

        // ── Giggle Physics: Staggered Spring Entrance ──────────────
        nodeGs.each(function (d, i) {
          const ng = d3.select(this);
          // Circles pop in from zero
          ng.select('.main-circle').attr('r', 0)
            .transition().delay(i * 55).duration(700)
            .ease(d3.easeElasticOut.amplitude(1.3).period(0.42))
            .attr('r', R);
          ng.select('.accept-ring').attr('r', 0)
            .transition().delay(i * 55).duration(700)
            .ease(d3.easeElasticOut.amplitude(1.3).period(0.42))
            .attr('r', R + 6);
          // Label fades in after circle
          ng.select('text').style('opacity', 0)
            .transition().delay(i * 55 + 220).duration(280)
            .style('opacity', 1);
        });

        // ── Giggle Physics: Idle Breathing ─────────────────────────
        // Each node circle does a gentle inhale/exhale on its own schedule
        nodeGs.each(function (d, i) {
          const ng = d3.select(this);
          const delay = i * 380 + Math.random() * 600;
          const breathe = () => {
            const dur = 2200 + Math.random() * 800;
            ng.select('.main-circle')
              .transition().delay(delay % 500).duration(dur / 2)
              .ease(d3.easeSinInOut).attr('r', R * 1.055)
              .transition().duration(dur / 2)
              .ease(d3.easeSinInOut).attr('r', R)
              .on('end', breathe);
          };
          setTimeout(breathe, delay);
        });

        simRef.current = sim;

        return () => {
          sim.stop();
          d3.select(el).selectAll('svg').remove();
        };
      }, [dfa, height]);

      // Update highlight colors
      useEffect(() => {
        if (!containerRef.current) return;
        const svg = d3.select(containerRef.current).select('svg');
        if (svg.empty()) return;
        svg.selectAll('g.node').each(function (d) {
          const ng = d3.select(this);
          const active = highlightStates.has(d.id);
          const gcol = groupColorMap ? groupColorMap[d.id] : null;
          ng.select('.main-circle')
            .attr('fill', active ? 'rgba(0,113,227,0.12)' : gcol ? gcol + '18' : '#fff')
            .attr('stroke', active ? '#0071E3' : gcol || '#1D1D1F')
            .attr('stroke-width', active ? 3 : gcol ? 2.5 : 2);
          ng.select('text').attr('fill', active ? '#0071E3' : gcol || '#1D1D1F');
          ng.select('.accept-ring').attr('stroke', active ? '#0071E3' : gcol || '#1D1D1F');
        });
      }, [highlightStates, groupColorMap]);



      return <div ref={containerRef} className="force-graph-container" style={{ width: '100%', height }} />;
    }

    /* ═══════════════════════════════
       STATUS LIGHT
    ═══════════════════════════════ */
    function StatusLight({ status }) {
      const cfg = {
        empty: { cls: 'light-gray', label: 'No DFA' },
        incomplete: { cls: 'light-orange', label: 'Incomplete' },
        error: { cls: 'light-red', label: 'Error' },
        complete: { cls: 'light-green', label: 'Complete ✓' },
      }[status] || { cls: 'light-gray', label: '—' };
      return (

    function generateJSON(dfa) {
      if (!dfa) return '{}';
      const obj = {
        states: dfa.states, alphabet: dfa.alphabet, start: dfa.start,
        accept: [...dfa.accept],
        transitions: dfa.states.flatMap(s => dfa.alphabet.map(a => ({ from: s, symbol: a, to: dfa.trans(s, a) || null }))),
      };
      return JSON.stringify(obj, null, 2);
    }
    function generateYAML(dfa) {
      if (!dfa) return '';
      const lines = [
        `states: [${dfa.states.join(', ')}]`,
        `alphabet: [${dfa.alphabet.join(', ')}]`,
        `start: ${dfa.start}`,
        `accept: [${[...dfa.accept].join(', ')}]`,
        `transitions:`,
        ...dfa.states.flatMap(s => dfa.alphabet.map(a => `  - { from: ${s}, symbol: ${a}, to: ${dfa.trans(s, a) || 'null'} }`)),
      ];
      return lines.join('\n');
    }
    function generatePython(dfa) {
      if (!dfa) return '';
      const deltaLines = dfa.states.map(s => `    '${s}': {${dfa.alphabet.map(a => `'${a}': '${dfa.trans(s, a)}'`).join(', ')}},`);
      return `# DFA — Generated by Myhill-Nerode Minimizer
# Auto-generated — do not edit manually

STATES   = [${dfa.states.map(s => `'${s}'`).join(', ')}]
ALPHABET = [${dfa.alphabet.map(a => `'${a}'`).join(', ')}]
START    = '${dfa.start}'
ACCEPT   = {${[...dfa.accept].map(s => `'${s}'`).join(', ')}}

DELTA = {
${deltaLines.join('\n')}
}

def run_dfa(input_str: str) -> tuple[bool, str]:
    """Run the DFA on input_str. Returns (accepted, trace)."""
    state = START
    trace = [state]
    for ch in input_str:
        if ch not in ALPHABET:
            return False, f"Unknown symbol '{ch}'"
        nxt = DELTA[state].get(ch)
        if nxt is None:
            return False, f"No transition from '{state}' on '{ch}'"
        state = nxt
        trace.append(state)
    accepted = state in ACCEPT
    return accepted, ' → '.join(trace)

if __name__ == '__main__':
    while True:
        s = input("Enter string (blank to quit): ")
        if not s:
            break
        ok, trace = run_dfa(s)
        print(f"  {'ACCEPTED ✓' if ok else 'REJECTED ✗'}  |  {trace}")
`;
    }
    function generateCpp(dfa) {
      if (!dfa) return '';
      const pairs = dfa.states.flatMap(s => dfa.alphabet.map(a => `    {{"${s}", '${a}'}, "${dfa.trans(s, a)}"}`));
      return `// DFA — Generated by Myhill-Nerode Minimizer
// Compile: g++ -std=c++17 dfa.cpp -o dfa

#include <iostream>
#include <string>
#include <map>
#include <set>
#include <vector>
using namespace std;

const string START = "${dfa.start}";
const set<string> ACCEPT = {${[...dfa.accept].map(s => `"${s}"`).join(', ')}};
const vector<char> ALPHABET = {${dfa.alphabet.map(a => `'${a}'`).join(', ')}};

const map<pair<string,char>, string> DELTA = {
${pairs.join(',\n')}
};

pair<bool,string> runDFA(const string& input) {
    string state = START;
    string trace = state;
    for (char ch : input) {
        auto it = DELTA.find({state, ch});
        if (it == DELTA.end())
            return {false, "No transition from " + state + " on '" + ch + "'"};
        state = it->second;
        trace += " → " + state;
    }
    return {ACCEPT.count(state) > 0, trace};
}

int main() {
    string input;
    while (true) {
        cout << "Enter string (blank to quit): ";
        getline(cin, input);
        if (input.empty()) break;
        auto [ok, trace] = runDFA(input);
        cout << (ok ? "  ACCEPTED ✓" : "  REJECTED ✗") << "  |  " << trace << "\\n";
    }
}
`;
    }

    function buildMNTableHTML(marked, newlyMarked, states, highlighted, isCheckingMarked) {
      const n = states.length, nm = new Set(newlyMarked || []);
      let html = '<div style="overflow-x:auto"><table class="mn-table"><thead><tr><th></th>';
      for (let j = 0; j < n - 1; j++) html += `<th>${esc(states[j])}</th>`;
      html += '</tr></thead><tbody>';
      for (let i = 1; i < n; i++) {
        html += `<tr><th>${esc(states[i])}</th>`;
        for (let j = 0; j < n - 1; j++) {
          if (j >= i) { html += '<td class="mn-cell empty"></td>'; }
          else {
            const key = `${j},${i}`, isMarked = marked[key], isNew = nm.has(key);
            const isHigh = highlighted === key;
            let cls;
            if (isHigh) { cls = isCheckingMarked ? 'checking-marked' : 'checking'; }
            else if (isNew) { cls = 'newly-marked'; }
            else if (isMarked) { cls = 'marked'; }
            else { cls = 'unmarked'; }
            html += `<td class="mn-cell ${cls}" data-pkey="${key}" style="cursor:pointer">${isMarked ? '✓' : ''}</td>`;
          }
        }
        html += '</tr>';
      }
      html += '</tbody></table>';
      if (marked) {
        const equivPairs = [];
        for (let i = 0; i < n; i++) for (let j = i + 1; j < n; j++) if (!marked[`${i},${j}`]) equivPairs.push([states[i], states[j]]);
        if (equivPairs.length) {
          const par2 = {}; states.forEach(s => par2[s] = s);
          const find2 = s => par2[s] === s ? s : (par2[s] = find2(par2[s]));
          equivPairs.forEach(([a, b]) => { par2[find2(a)] = find2(b); });
          const cls2 = {}; states.forEach(s => { const r = find2(s); if (!cls2[r]) cls2[r] = []; if (!cls2[r].includes(s)) cls2[r].push(s); });
          const grps = Object.values(cls2).filter(g => g.length > 1);
          if (grps.length) {
            html += '<div style="margin-top:12px;font-family:JetBrains Mono,monospace;font-size:.68rem;color:#6E6E73;margin-bottom:6px">Indistinguishable (unmarked):</div>';
            html += '<div style="display:flex;flex-wrap:wrap;gap:6px">';
            grps.forEach(g => { html += `<div class="mn-equiv-class">{${g.join(', ')}}</div>`; });
            html += '</div>';
          }
        }
      }
      return html + '</div>';
    }

    function MagneticButton({ children, className, onClick, disabled, type = 'button' }) {

      useEffect(() => {

        xTo.current = gsap.quickTo(ref.current, 'x', { duration: .45, ease: 'power3' });

      }, [disabled]);

      const onLeave = () => { xTo.current && xTo.current(0); yTo.current && yTo.current(0); };

    /* ═══════════════════════════════
       REGEX → DFA  (Thompson + Subset)
    ═══════════════════════════════ */
    function regexToDFA(pattern) {
      // Tokenize
      let pos = 0;
      const peek = () => pattern[pos];
      const consume = () => pattern[pos++];

      // NFA state factory
      let stateId = 0;
      const newState = () => ({ id: stateId++, eps: [], trans: {} });

      // Thompson construction
      function parseExpr() { return parseAlt(); }

      function parseAlt() {
        let nfa = parseCat();
        while (pos < pattern.length && peek() === '|') {
          consume();
          const right = parseCat();
          const s = newState(), e = newState();
          s.eps.push(nfa.start, right.start);
          nfa.end.eps.push(e); right.end.eps.push(e);
          nfa = { start: s, end: e };
        }
        return nfa;
      }

      function parseCat() {
        let nfa = parseQuantified();
        while (pos < pattern.length && peek() !== ')' && peek() !== '|') {
          const right = parseQuantified();
          nfa.end.eps.push(right.start);
          nfa = { start: nfa.start, end: right.end };
        }
        return nfa;
      }

      function parseQuantified() {
        let nfa = parseAtom();
        while (pos < pattern.length && (peek() === '*' || peek() === '+' || peek() === '?')) {
          const op = consume();
          const s = newState(), e = newState();
          if (op === '*') {
            s.eps.push(nfa.start, e); nfa.end.eps.push(nfa.start, e);
          } else if (op === '+') {
            s.eps.push(nfa.start); nfa.end.eps.push(nfa.start, e);
          } else {
            s.eps.push(nfa.start, e); nfa.end.eps.push(e);
          }
          nfa = { start: s, end: e };
        }
        return nfa;
      }

      function parseAtom() {
        if (pos >= pattern.length) throw new Error('Unexpected end of regex');
        if (peek() === '(') {
          consume();
          const nfa = parseExpr();
          if (peek() !== ')') throw new Error('Missing closing parenthesis');
          consume();
          return nfa;
        }
        if (peek() === '\\') { consume(); }
        const ch = consume();
        if (!ch) throw new Error('Empty atom');
        const s = newState(), e = newState();
        s.trans[ch] = [e];
        return { start: s, end: e };
      }

      const nfa = parseExpr();
      if (pos < pattern.length) throw new Error(`Unexpected character '${pattern[pos]}' at position ${pos}`);

      // Collect NFA alphabet
      const alphaSet = new Set();
      const allStates = [];
      const visited = new Set();
      const collectStates = (st) => {
        if (visited.has(st.id)) return; visited.add(st.id); allStates.push(st);
        Object.keys(st.trans).forEach(ch => { alphaSet.add(ch); st.trans[ch].forEach(collectStates); });
        st.eps.forEach(collectStates);
      };
      collectStates(nfa.start);
      const alphabet = [...alphaSet].sort();
      if (!alphabet.length) throw new Error('Regex matches only empty string — no symbols to build DFA from');

      // Epsilon closure
      const epsClosure = (stSet) => {
        const closure = new Set(stSet.map(s => s.id));
        const stack = [...stSet];
        while (stack.length) {
          const st = stack.pop();
          st.eps.forEach(nx => { if (!closure.has(nx.id)) { closure.add(nx.id); stack.push(nx); } });
        }
        return closure;
      };
      const stateById = {};
      allStates.forEach(s => { stateById[s.id] = s; });
      const getStates = (idSet) => [...idSet].map(id => stateById[id]).filter(Boolean);

      // Subset construction
      const startClosure = epsClosure([nfa.start]);
      const setKey = (s) => [...s].sort((a, b) => a - b).join(',');
      const dfaStates = [startClosure];
      const dfaMap = { [setKey(startClosure)]: 0 };
      const dfaDelta = [{}];
      const queue = [startClosure];

      while (queue.length) {
        const cur = queue.shift();
        const curIdx = dfaMap[setKey(cur)];
        for (const sym of alphabet) {
          const nextRaw = new Set();
          getStates(cur).forEach(st => { (st.trans[sym] || []).forEach(nx => nextRaw.add(nx)); });
          if (!nextRaw.size) continue;
          const nextClosure = epsClosure([...nextRaw]);
          const nk = setKey(nextClosure);
          if (dfaMap[nk] === undefined) {
            dfaMap[nk] = dfaStates.length;
            dfaStates.push(nextClosure);
            dfaDelta.push({});
            queue.push(nextClosure);
          }
          dfaDelta[curIdx][sym] = dfaMap[nk];
        }
      }

      // Build result
      const dfaStateNames = dfaStates.map((_, i) => `q${i}`);
      const acceptStates = dfaStates.map((set, i) => set.has(nfa.end.id) ? dfaStateNames[i] : null).filter(Boolean);
      const transLines = [];
      dfaStates.forEach((_, i) => {
        for (const sym of alphabet) {
          if (dfaDelta[i][sym] !== undefined) {
            transLines.push(`${dfaStateNames[i]},${sym}->${dfaStateNames[dfaDelta[i][sym]]}`);
          }
        }
      });

      return {
        statesStr: dfaStateNames.join(','),
        alphaStr: alphabet.join(','),
        startStr: 'q0',
        acceptStr: acceptStates.join(','),
        transStr: transLines.join('\n'),
      };
    }

    function BuildTab({ onDFABuilt, initDFA, showToast }) {
      const [inputMode, setInputMode] = useState('dfa'); // 'dfa' | 'regex' | 'upload'
      const [states, setStates] = useState(initDFA ? initDFA._raw?.states || '' : '');
      const [alpha, setAlpha] = useState(initDFA ? initDFA._raw?.alpha || '' : '');
      const [start, setStart] = useState(initDFA ? initDFA._raw?.start || '' : '');
      const [accept, setAccept] = useState(initDFA ? initDFA._raw?.accept || '' : '');
      const [trans, setTrans] = useState(initDFA ? initDFA._raw?.trans || '' : '');
      const [error, setError] = useState('');
      const [dfa, setDfa] = useState(initDFA || null);
      const [exIdx, setExIdx] = useState(-1);

      // Auto-generate template
      const [numStates, setNumStates] = useState('');
      const [genAlpha, setGenAlpha] = useState('0,1');

      // Regex mode
      const [regexInput, setRegexInput] = useState('');
      const [regexError, setRegexError] = useState('');
      const fileInputRef = useRef(null);

      const generateTemplate = () => {
        const n = parseInt(numStates, 10);
        if (!n || isNaN(n) || n <= 0) return;
        const generatedStates = Array.from({ length: n }, (_, i) => `q${i}`);
        setStates(generatedStates.join(', '));
        setStart('q0');
        setAlpha(genAlpha);
        const splitAlpha = genAlpha.split(',').map(s => s.trim()).filter(Boolean);
        let newTrans = '';
        for (const q of generatedStates) {
          for (const a of splitAlpha) {
            newTrans += `${q},${a}->q\n`;
          }
        }
        setTrans(newTrans);
      };

      // ── File Upload ──
      const handleFileUpload = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (ev) => {
          const text = ev.target.result;
          try {
            let parsed = null;
            const ext = file.name.split('.').pop().toLowerCase();

            // Try JSON
            if (ext === 'json' || text.trim().startsWith('{') || text.trim().startsWith('[')) {
              try { parsed = JSON.parse(text); } catch (_) { }
            }

            if (parsed) {
              // Support several JSON shapes
              const s = parsed.states || parsed.States || [];
              const a = parsed.alphabet || parsed.Alphabet || parsed.sigma || [];
              const st = parsed.start || parsed.initial || parsed.start_state || '';
              const acc = parsed.accept || parsed.accepting || parsed.final || parsed.accept_states || [];
              const trList = parsed.transitions || parsed.delta || parsed.transition_function || [];
              let transStr = '';
              if (Array.isArray(trList)) {
                trList.forEach(t => {
                  const from = t.from || t.state || t[0];
                  const sym = t.symbol || t.input || t[1];
                  const to = t.to || t.next || t.dest || t[2];
                  if (from && sym !== undefined && to) transStr += `${from},${sym}->${to}\n`;
                });
              } else if (typeof trList === 'object') {
                // dict-of-dicts: { q0: { '0': 'q1' } }
                Object.entries(trList).forEach(([from, bySymbol]) => {
                  Object.entries(bySymbol).forEach(([sym, to]) => {
                    transStr += `${from},${sym}->${to}\n`;
                  });
                });
              }
              setStates(Array.isArray(s) ? s.join(',') : s);
              setAlpha(Array.isArray(a) ? a.join(',') : a);
              setStart(Array.isArray(st) ? st[0] : st);
              setAccept(Array.isArray(acc) ? acc.join(',') : acc);
              setTrans(transStr.trim());
              setInputMode('dfa');
              showToast('File Loaded ✓', `Imported "${file.name}" as JSON`);
              return;
            }

            // YAML-like / Python / plaintext heuristic parser
            const get = (keys, def = '') => {
              for (const k of keys) {
                const re = new RegExp(`^\\s*${k}\\s*[=:]\\s*(.+)`, 'im');
                const m = text.match(re);
                if (m) return m[1].trim().replace(/[\[\]'"{}]/g, '');
              }
              return def;
            };

            const rawStates = get(['states', 'STATES', 'Q']);
            const rawAlpha = get(['alphabet', 'ALPHABET', 'sigma', 'SIGMA']);
            const rawStart = get(['start', 'START', 'initial', 'q0']);
            const rawAccept = get(['accept', 'ACCEPT', 'final', 'accepting', 'F']);

            // Parse transitions from DELTA = { ... } or transition lines
            let transStr = '';
            const deltaBlock = text.match(/DELTA\s*=\s*\{([\s\S]*?)\}/i) ||
              text.match(/transitions?\s*[=:]\s*\{([\s\S]*?)\}/i);
            if (deltaBlock) {
              const inner = deltaBlock[1];
              // 'q0': {'0': 'q1', '1': 'q2'}
              const stateRe = /['"](\w+)['"]\s*:\s*\{([^}]+)\}/g;
              let sm;
              while ((sm = stateRe.exec(inner)) !== null) {
                const from = sm[1];
                const symRe = /['"](.)['"]:['"](\w+)['"]|['"](.)['"]:['"](\w+)['"]|(\w+):\s*(\w+)/g;
                let tm;
                while ((tm = symRe.exec(sm[2])) !== null) {
                  const sym = tm[1] || tm[3] || tm[5];
                  const to = tm[2] || tm[4] || tm[6];
                  if (sym && to) transStr += `${from},${sym}->${to}\n`;
                }
              }
            } else {
              // Look for state,sym->next lines
              const lineRe = /^\s*(\w+)\s*,\s*(\S+)\s*(?:->|→)\s*(\w+)/gm;
              let lm;
              while ((lm = lineRe.exec(text)) !== null) {
                transStr += `${lm[1]},${lm[2]}->${lm[3]}\n`;
              }
              // YAML list: - { from: q0, symbol: 0, to: q1 }
              const yamlRe = /-\s*\{\s*from:\s*(\w+)\s*,\s*symbol:\s*(\S+?)\s*,\s*to:\s*(\w+)/g;
              let ym;
              while ((ym = yamlRe.exec(text)) !== null) {
                transStr += `${ym[1]},${ym[2]}->${ym[3]}\n`;
              }
            }

            if (!rawStates && !transStr) throw new Error('Could not parse DFA from this file. Please use JSON, YAML, Python, or plain transition format.');

            setStates(rawStates); setAlpha(rawAlpha); setStart(rawStart);
            setAccept(rawAccept); setTrans(transStr.trim());
            setInputMode('dfa');
            showToast('File Loaded ✓', `Imported "${file.name}"`);
          } catch (err) {
            setError('File import error: ' + err.message);
          }
          // Reset file input so same file can be re-uploaded
          if (fileInputRef.current) fileInputRef.current.value = '';
        };
        reader.readAsText(file);
      };

      // ── Regex → DFA ──
      const convertRegex = () => {
        setRegexError('');
        try {
          const result = regexToDFA(regexInput.trim());
          setStates(result.statesStr);
          setAlpha(result.alphaStr);
          setStart(result.startStr);
          setAccept(result.acceptStr);
          setTrans(result.transStr);
          setInputMode('dfa');
          showToast('Regex Converted ✓', `Built DFA from: ${regexInput}`);
        } catch (err) {
          setRegexError(err.message);
        }
      };

      // Live validation
      const [liveDFA, setLiveDFA] = useState(null);
      const [liveMin, setLiveMin] = useState(null);
      const [dfaStatus, setDfaStatus] = useState('empty');
      const debounceRef = useRef(null);

      useEffect(() => {
        clearTimeout(debounceRef.current);
        if (!states && !alpha && !start) { setDfaStatus('empty'); setLiveDFA(null); setLiveMin(null); return; }
        debounceRef.current = setTimeout(() => {
          try {
            const d = parseDFA(states, alpha, start, accept, trans);
            setLiveDFA(d); setLiveMin(minimizeDFA(d)); setDfaStatus('complete');
          } catch (e) {
            const msg = e.message;
            setLiveMin(null);
            if (msg.includes('Missing:')) { setDfaStatus('incomplete'); setLiveDFA(null); }
            else if (msg.includes('empty') || msg.includes('missing') || (!states && !alpha)) { setDfaStatus('empty'); setLiveDFA(null); }
            else { setDfaStatus('error'); setLiveDFA(null); }
          }
        }, 380);
        return () => clearTimeout(debounceRef.current);
      }, [states, alpha, start, accept, trans]);

      const loadExample = () => {
        let next;
        do { next = Math.floor(Math.random() * DFA_EXAMPLES.length); } while (next === exIdx && DFA_EXAMPLES.length > 1);
        setExIdx(next);
        const ex = DFA_EXAMPLES[next];
        setStates(ex.states); setAlpha(ex.alpha); setStart(ex.start); setAccept(ex.accept); setTrans(ex.trans);
        showToast(ex.name, ex.desc);
      };

      const buildDFA = () => {
        setError('');
        if (liveDFA && dfaStatus === 'complete') {
          const rawData = { states, alpha, start, accept, trans };
          liveDFA._raw = rawData;
          setDfa(liveDFA); onDFABuilt(liveDFA);
        } else {
          try {
            const d = parseDFA(states, alpha, start, accept, trans);
            const rawData = { states, alpha, start, accept, trans }; d._raw = rawData;
            setDfa(d); onDFABuilt(d);
          } catch (e) { setError(e.message); }
        }
      };

      const tableHTML = useCallback(() => {
        const src = dfa;
        if (!src) return '';
        let h = '<table class="dfa-table"><thead><tr><th>State</th>';
        src.alphabet.forEach(a => { h += `<th>${esc(a)}</th>`; });
        h += '</tr></thead><tbody>';
        src.states.forEach(s => {
          const isA = src.accept.has(s), isS = src.start === s;
          let lbl = s, cls = '';
          if (isS && isA) { lbl = '→* ' + s; cls = 'cell-both'; }
          else if (isS) { lbl = '→  ' + s; cls = 'cell-start'; }
          else if (isA) { lbl = '*  ' + s; cls = 'cell-accept'; }
          h += `<tr><td class="${cls}">${lbl}</td>`;
          src.alphabet.forEach(sym => { h += `<td>${src.trans(s, sym) || '—'}</td>`; });
          h += '</tr>';
        });
        return h + '</tbody></table>';
      }, [dfa]);

      const previewDFA = dfaStatus === 'complete' ? liveDFA : dfa;
      const liveOrigN = liveDFA ? liveDFA.states.length : 0;
      const liveMinN = liveMin ? liveMin.minDFA.states.length : 0;
      const livePct = liveOrigN > 0 ? Math.round((1 - liveMinN / liveOrigN) * 100) : 0;

      return (
        <div className="animate-tab-in grid gap-5 grid-builder" style={{ gridTemplateColumns: '340px 1fr', alignItems: 'start' }}>
          {/* Form */}
          <div className="bg-white rounded-2xl p-6 shadow-card border border-[#D2D2D7]" style={{ borderTop: '3px solid #0071E3' }}>
            <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 16 }}>
              <h2 className="font-mono text-xs font-bold text-[#6E6E73] uppercase tracking-widest">DFA Definition</h2>
              <StatusLight status={dfaStatus} />
            </div>

            {/* ── Input mode switcher ── */}
            <div style={{ display: 'flex', gap: 4, marginBottom: 16, background: '#F5F5F7', borderRadius: 12, padding: 4 }}>
              {[['dfa', '⌨ Manual DFA'], ['regex', '🔤 Regex'], ['upload', '📂 Upload File']].map(([mode, label]) => (
                <button key={mode} onClick={() => setInputMode(mode)}
                  style={{
                    flex: 1, padding: '6px 4px', borderRadius: 8, border: 'none', cursor: 'pointer',
                    fontFamily: 'JetBrains Mono,monospace', fontSize: '10px', fontWeight: 600,
                    background: inputMode === mode ? '#0071E3' : 'transparent',
                    color: inputMode === mode ? '#fff' : '#6E6E73',
                    transition: 'all .2s',
                  }}>
                  {label}
                </button>
              ))}
            </div>

            {/* ── REGEX MODE ── */}
            {inputMode === 'regex' && (
              <div style={{ marginBottom: 16 }}>
                <div style={{ fontFamily: 'JetBrains Mono,monospace', fontSize: 10, fontWeight: 700, color: '#5E5CE6', textTransform: 'uppercase', letterSpacing: '0.07em', marginBottom: 10 }}>Regular Expression → DFA</div>
                <label style={{ display: 'block', fontSize: 11, fontWeight: 600, color: '#1D1D1F', marginBottom: 6 }}>Enter Regular Expression</label>
                <div style={{ position: 'relative', marginBottom: 8 }}>
                  <input value={regexInput} onChange={e => { setRegexInput(e.target.value); setRegexError(''); }}
                    onScroll={e => { if (e.target.nextElementSibling) e.target.nextElementSibling.scrollLeft = e.target.scrollLeft; }}
                    spellCheck={false}
                    className="mono-input regex-input"
                    style={{ width: '100%', color: 'transparent', margin: 0, position: 'relative', zIndex: 1 }} />
                  <div style={{
                    position: 'absolute', top: '1.5px', left: '1.5px', right: '1.5px', bottom: '1.5px',
                    pointerEvents: 'none', zIndex: 2, padding: '9px 12px',
                    fontFamily: 'JetBrains Mono,monospace', fontSize: '0.82rem',
                    whiteSpace: 'pre', overflow: 'hidden', color: regexInput ? 'inherit' : '#C7C7CC'
                  }}
                    dangerouslySetInnerHTML={{
                      __html: regexInput === ''
                        ? 'e.g.  (0|1)*0  or  a(ba)*'
                        : regexInput.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/([*+])/g, '<span class="regex-operator" style="display:inline-block;transform:translateY(-5px) scale(0.85)">$1</span>')
                    }}></div>
                </div>
                <div style={{ fontFamily: 'JetBrains Mono,monospace', fontSize: 9.5, color: '#6E6E73', marginBottom: 12, lineHeight: 1.7 }}>
                  Supported: <code style={{ color: '#5E5CE6' }}>|</code> (union) · <code style={{ color: '#5E5CE6' }}><sup>*</sup></code> (Kleene) · <code style={{ color: '#5E5CE6' }}><sup>+</sup></code> (one-or-more) · <code style={{ color: '#5E5CE6' }}>?</code> (optional) · <code style={{ color: '#5E5CE6' }}>()</code> (groups) · literals
                </div>
                <button onClick={convertRegex}
                  style={{ width: '100%', padding: '9px', borderRadius: 10, border: 'none', background: '#5E5CE6', color: '#fff', fontFamily: 'JetBrains Mono,monospace', fontSize: 12, fontWeight: 700, cursor: 'pointer' }}>
                  Convert to DFA →
                </button>
                {regexError && <div className="error-box" style={{ marginTop: 10 }}>{regexError}</div>}
                <div style={{ marginTop: 14, padding: '10px 12px', background: 'rgba(94,92,230,0.06)', borderRadius: 10, border: '1px solid rgba(94,92,230,0.15)' }}>
                  <div style={{ fontFamily: 'JetBrains Mono,monospace', fontSize: 9, color: '#5E5CE6', fontWeight: 700, marginBottom: 6 }}>EXAMPLES</div>
                  {[['(0|1)*0', 'Strings ending in 0'], ['a(ba)*', 'Alternating a,b'], ['(ab)+', 'One or more ab'], ['0*10*', 'Exactly one 1']].map(([ex, desc]) => (
                    <div key={ex} style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 4, cursor: 'pointer' }}
                      onClick={() => { setRegexInput(ex); setRegexError(''); }}>
                      <code style={{ fontFamily: 'JetBrains Mono,monospace', fontSize: 11, color: '#5E5CE6' }} dangerouslySetInnerHTML={{ __html: ex.replace(/([*+])/g, '<sup>$1</sup>') }}></code>
                      <span style={{ fontFamily: 'JetBrains Mono,monospace', fontSize: 9, color: '#6E6E73' }}>{desc}</span>
                    </div>
                  ))}
                </div>
              </div>
            )}

            {/* ── UPLOAD MODE ── */}
            {inputMode === 'upload' && (
              <div style={{ marginBottom: 16 }}>
                <div style={{ fontFamily: 'JetBrains Mono,monospace', fontSize: 10, fontWeight: 700, color: '#30D158', textTransform: 'uppercase', letterSpacing: '0.07em', marginBottom: 10 }}>Import DFA from File</div>
                <label style={{
                  display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center',
                  border: '2px dashed #D2D2D7', borderRadius: 14, padding: '28px 16px', cursor: 'pointer',
                  background: '#F5F5F7', transition: 'border-color .2s',
                }} onMouseEnter={e => e.currentTarget.style.borderColor = '#30D158'}
                  onMouseLeave={e => e.currentTarget.style.borderColor = '#D2D2D7'}>
                  <div style={{ fontSize: 28, marginBottom: 8 }}>📂</div>
                  <div style={{ fontFamily: 'JetBrains Mono,monospace', fontSize: 12, fontWeight: 700, color: '#1D1D1F', marginBottom: 4 }}>Click to choose file</div>
                  <div style={{ fontFamily: 'JetBrains Mono,monospace', fontSize: 10, color: '#6E6E73' }}>JSON · YAML · Python · .txt</div>
                  <input ref={fileInputRef} type="file" accept=".json,.yaml,.yml,.py,.txt" onChange={handleFileUpload} style={{ display: 'none' }} />
                </label>
                <div style={{ marginTop: 14, padding: '10px 12px', background: 'rgba(48,209,88,0.05)', borderRadius: 10, border: '1px solid rgba(48,209,88,0.2)' }}>
                  <div style={{ fontFamily: 'JetBrains Mono,monospace', fontSize: 9, color: '#30D158', fontWeight: 700, marginBottom: 6 }}>SUPPORTED FORMATS</div>
                  {[['JSON', '{states:[...], alphabet:[...], start:"q0", accept:[...], transitions:[...]}'],
                  ['Python', 'STATES=[...], ALPHABET=[...], START="q0", ACCEPT={...}, DELTA={...}'],
                  ['YAML', 'states: [...], alphabet: [...], start: q0, accept: [...], transitions: [...]'],
                  ['Text', 'q0,0->q1  (one transition per line)'],
                  ].map(([fmt, ex]) => (
                    <div key={fmt} style={{ marginBottom: 6 }}>
                      <span style={{ fontFamily: 'JetBrains Mono,monospace', fontSize: 10, fontWeight: 700, color: '#30D158' }}>{fmt}</span>
                      <div style={{ fontFamily: 'JetBrains Mono,monospace', fontSize: 8.5, color: '#6E6E73', marginTop: 1 }}>{ex}</div>
                    </div>
                  ))}
                </div>
              </div>
            )}

            {/* ── DFA MANUAL MODE ── */}
            {inputMode === 'dfa' && (
              <>
                <div className="mb-5 p-3.5 rounded-xl border border-dashed border-[#D2D2D7] bg-[#F5F5F7]">
                  <div className="font-mono text-[10px] font-bold text-[#0071E3] uppercase tracking-widest mb-2">Auto-Generate Template</div>
                  <div className="flex gap-2 items-end">
                    <div className="flex-1">
                      <label className="block text-[10px] font-semibold text-[#6E6E73] mb-1">Number of States</label>
                      <input type="number" min="1" value={numStates} onChange={e => setNumStates(e.target.value)} placeholder="e.g. 4" className="mono-input" style={{ padding: '6px 10px' }} />
                    </div>
                    <div className="flex-1">
                      <label className="block text-[10px] font-semibold text-[#6E6E73] mb-1">Alphabet (comma-separated)</label>
                      <input value={genAlpha} onChange={e => setGenAlpha(e.target.value)} placeholder="0,1" className="mono-input" style={{ padding: '6px 10px' }} />
                    </div>
                    <button onClick={generateTemplate} className="px-3 rounded-lg bg-[#0071E3] text-white font-mono text-[11px] font-bold shadow-btn hover:bg-[#0077ED] transition-colors" style={{ height: '31px' }}>
                      Generate
                    </button>
                  </div>
                </div>

                {[
                  { id: 'states', label: 'States', hint: 'comma-separated', val: states, set: setStates, ph: 'q0,q1,q2,q3' },
                  { id: 'alpha', label: 'Alphabet Σ', hint: 'comma-separated', val: alpha, set: setAlpha, ph: '0,1' },
                  { id: 'start', label: 'Start State q₀', hint: '', val: start, set: setStart, ph: 'q0' },
                  { id: 'accept', label: 'Accept States F', hint: 'comma-separated', val: accept, set: setAccept, ph: 'q2,q4' },
                ].map(f => (
                  <div key={f.id} className="mb-4">
                    <label className="block text-xs font-semibold text-[#1D1D1F] mb-1.5">
                      {f.label} {f.hint && <span className="text-[#6E6E73] font-normal">({f.hint})</span>}
                    </label>
                    <input value={f.val} onChange={e => f.set(e.target.value)} placeholder={f.ph} className="mono-input" />
                  </div>
                ))}
                <div className="mb-4">
                  <label className="block text-xs font-semibold text-[#1D1D1F] mb-1">Transition Function δ</label>
                  <p className="text-[#6E6E73] text-xs mb-1.5 font-mono">Format: <code style={{ color: '#5E5CE6' }}>state,symbol→next</code></p>
                  <textarea value={trans} onChange={e => setTrans(e.target.value)} rows={8}
                    placeholder={'q0,0->q1\nq0,1->q2\nq1,0->q3\n...'} className="mono-input" />
                </div>
              </>
            )}

            {/* ── Action buttons (always visible) ── */}
            {inputMode === 'dfa' && (
              <div className="flex gap-2.5" style={{ marginBottom: error ? 0 : 0 }}>
                <MagneticButton onClick={loadExample} className="flex-1 py-2.5 px-3 text-xs font-mono font-semibold rounded-xl border border-[#D2D2D7] bg-white text-[#6E6E73] hover:border-[#0071E3] hover:text-[#0071E3] transition-colors cursor-pointer">
                  Load Example
                </MagneticButton>
                <MagneticButton onClick={buildDFA} className="flex-1 py-2.5 px-3 text-xs font-mono font-bold rounded-xl bg-[#0071E3] text-white shadow-btn hover:bg-[#0077ED] transition-colors cursor-pointer">
                  Build & Preview →
                </MagneticButton>
              </div>
            )}
            {error && <div className="error-box mt-4">{error}</div>}

            {/* Live Minimization Preview */}
            {dfaStatus === 'complete' && liveMin && (
              <div className="live-preview mt-4">
                <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 8 }}>
                  <span style={{ fontFamily: 'JetBrains Mono,monospace', fontSize: 10, fontWeight: 700, color: '#0071E3', textTransform: 'uppercase', letterSpacing: '0.07em' }}>
                    ⚡ Live Minimization
                  </span>
                  <span style={{ fontFamily: 'JetBrains Mono,monospace', fontSize: 9, color: '#30D158' }}>Auto ✓</span>
                </div>
                <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr 1fr', gap: 8 }}>
                  {[
                    { label: 'Original', val: liveOrigN, color: '#FF9F0A' },
                    { label: 'Minimized', val: liveMinN, color: '#30D158' },
                    { label: 'Reduction', val: livePct + '%', color: '#0071E3' },
                  ].map(({ label, val, color }) => (
                    <div key={label} style={{ textAlign: 'center', padding: '8px 4px', background: 'rgba(255,255,255,0.7)', borderRadius: 8 }}>
                      <div style={{ fontFamily: 'JetBrains Mono,monospace', fontSize: 16, fontWeight: 700, color }}>{val}</div>
                      <div style={{ fontFamily: 'JetBrains Mono,monospace', fontSize: 8, color: '#6E6E73', marginTop: 2 }}>{label}</div>
                    </div>
                  ))}
                </div>
                <div style={{ fontFamily: 'JetBrains Mono,monospace', fontSize: 9, color: '#6E6E73', marginTop: 8 }}>
                  Classes: {liveMin.finalPartitions.map(g => `{${g.join(',')}}`).join(' · ')}
                </div>
              </div>
            )}
          </div>

          {/* Preview Column */}
          <div className="flex flex-col gap-5">
            <div className="bg-white rounded-2xl p-5 shadow-card border border-[#D2D2D7]" style={{ borderTop: '3px solid #5E5CE6' }}>
              <h2 className="font-mono text-xs font-bold text-[#6E6E73] uppercase tracking-widest mb-3">Transition Table δ</h2>
              {dfa
                ? <div style={{ overflowX: 'auto' }} dangerouslySetInnerHTML={{ __html: tableHTML() }} />
                : <p className="text-[#6E6E73] font-mono text-xs">Fill the form and click Build & Preview.</p>}
            </div>
            <div className="bg-white rounded-2xl p-5 shadow-card border border-[#D2D2D7]" style={{ borderTop: '3px solid #30D158' }}>
              <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 12 }}>
                <h2 className="font-mono text-xs font-bold text-[#6E6E73] uppercase tracking-widest">
                  DFA Graph
                  <span className="text-[10px] bg-[#F5F5F7] border border-[#D2D2D7] text-[#6E6E73] rounded px-2 py-0.5 ml-1">Original</span>
                </h2>
                {previewDFA && <span style={{ fontFamily: 'JetBrains Mono,monospace', fontSize: 9, color: '#6E6E73' }}>Drag nodes · Scroll to zoom</span>}
              </div>
              {previewDFA
                ? <ForceGraph dfa={previewDFA} height={340} />
                : <p className="text-[#6E6E73] font-mono text-xs">Build a DFA to see the interactive graph.</p>}
            </div>
          </div>
        </div>
      );
    }
