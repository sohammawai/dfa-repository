      { id: 'apple', label: 'Classic Light', hex: '#0071E3', hover: '#0077ED', bg: '#F5F5F7', panel: '#fff', text: '#1D1D1F', muted: '#6E6E73', border: '#D2D2D7', shadow: '0 4px 24px rgba(0,0,0,0.06)' },
      { id: 'dark', label: 'Midnight Dark', hex: '#33A8FF', hover: '#5ebaff', bg: '#090a0c', panel: '#16171b', text: '#F5F5F7', muted: '#8e8e93', border: '#2c2c35', shadow: '0 8px 32px rgba(0,0,0,0.5)' },
      { id: 'matrix', label: 'Matrix Hacker', hex: '#30D158', hover: '#3add66', bg: '#050a06', panel: '#0a160d', text: '#a2fca2', muted: '#5a825a', border: '#17361d', shadow: '0 8px 32px rgba(48,209,88,0.08)' },
      { id: 'purple', label: 'Neon Violet', hex: '#a668f5', hover: '#b882f7', bg: '#0b0814', panel: '#151029', text: '#f0ecfa', muted: '#8278a3', border: '#2d2552', shadow: '0 8px 32px rgba(166,104,245,0.12)' },
      { id: 'cyberpunk', label: 'Cyber Pink', hex: '#FF2D55', hover: '#ff4c6d', bg: '#12050b', panel: '#1c0c14', text: '#fae3ec', muted: '#9e6783', border: '#421a2f', shadow: '0 8px 32px rgba(255,45,85,0.12)' },
      { id: 'sepia', label: 'Vintage Sepia', hex: '#c47c0a', hover: '#da8a0b', bg: '#fdf6e3', panel: '#f0e6ce', text: '#594a38', muted: '#948371', border: '#d9cdb4', shadow: '0 6px 24px rgba(133,103,66,0.08)' }
    ];

    function ThemeSelector() {
      const [isOpen, setIsOpen] = useState(false);
      const [theme, setTheme] = useState(THEMES[0]);

      useEffect(() => {
        let styleEl = document.getElementById('dynamic-theme');
        if (!styleEl) {
          styleEl = document.createElement('style');
          styleEl.id = 'dynamic-theme';
          document.head.appendChild(styleEl);
        }
        if (theme.id === 'apple') {
          styleEl.innerHTML = `
            body, .app-body, .bg-white, .feature-card, .sim-track-card, .glass-sidebar, .glass-header, .dfa-table td, .mn-cell {
              transition: background-color 0.5s ease, border-color 0.5s ease, box-shadow 0.5s ease !important;
            }
            * { transition: color 0.5s ease; }
            .regex-input { caret-color: #0071E3 !important; }
            .regex-operator { color: #5E5CE6 !important; }
          `;
        } else {
          styleEl.innerHTML = `
            body, .app-body, .bg-white, .feature-card, .sim-track-card, .glass-sidebar, .glass-header, .dfa-table td, .mn-cell {
              transition: background-color 0.5s ease, border-color 0.5s ease, box-shadow 0.5s ease !important;
            }
            * { transition: color 0.5s ease; }
            
            /* Core Backgrounds & Text */
            body, #root, .app-body { background-color: ${theme.bg} !important; color: ${theme.text} !important; }
            .bg-white, .glass-sidebar, .feature-card, .sim-track-card, .export-modal, .bg-\\[\\#fff\\] { background-color: ${theme.panel} !important; }
            .glass-header { background-color: ${theme.panel}aa !important; backdrop-filter: blur(16px) !important; -webkit-backdrop-filter: blur(16px) !important; }
            .bg-\\[\\#F5F5F7\\] { background-color: ${theme.bg} !important; }
            
            /* Shadows for Cards & Header */
            .shadow-card, .feature-card, .sim-track-card { box-shadow: ${theme.shadow} !important; }
            .glass-header { box-shadow: 0 1px 12px ${theme.shadow.split('rgba')[1] ? 'rgba' + theme.shadow.split('rgba')[1] : 'rgba(0,0,0,0.1)'} !important; }
            
            /* Typography */
            .text-\\[\\#1D1D1F\\] { color: ${theme.text} !important; }
            .text-\\[\\#6E6E73\\] { color: ${theme.muted} !important; }
            h1, h2, h3, p { color: ${theme.text} !important; }
            
            /* Overriding specific React inline styles */
            [style*="color: #1D1D1F"], [style*="color: rgb(29, 29, 31)"], 
            [style*="color: #1d1d1f"] { color: ${theme.text} !important; }
            [style*="color: #6E6E73"], [style*="color: rgb(110, 110, 115)"],
            [style*="color: #6e6e73"] { color: ${theme.muted} !important; }
            [style*="background: #F5F5F7"], [style*="background: rgb(245, 245, 247)"],
            [style*="background: #f5f5f7"] { background-color: ${theme.bg} !important; }
            [style*="background: #fff"], [style*="background: rgb(255, 255, 255)"],
            [style*="background-color: white"] { background-color: ${theme.panel} !important; }
            
            /* Borders */
            .border-\\[\\#D2D2D7\\] { border-color: ${theme.border} !important; }
            [style*="border-color: #D2D2D7"], [style*="border-color: rgb(210, 210, 215)"],
            [style*="border: 1px solid #D2D2D7"], [style*="border: 1.5px solid #D2D2D7"] { border-color: ${theme.border} !important; }
            .mono-input { background: ${theme.bg} !important; color: ${theme.text} !important; border-color: ${theme.border} !important; transition: border-color 0.2s !important; }
            .mono-input:focus { border-color: ${theme.hex} !important; box-shadow: 0 0 0 3px ${theme.hex}22 !important; outline: none; }
            
            /* Regex Input Customizations */
            .regex-input { caret-color: ${theme.hex} !important; }
            .regex-operator { color: ${theme.hex} !important; }
            
            /* Tables & Specific Components */
            .dfa-table th, .mn-table thead th { background: ${theme.bg} !important; color: ${theme.muted} !important; border-color: ${theme.border} !important; }
            .dfa-table td { background: ${theme.panel} !important; color: ${theme.text} !important; border-color: ${theme.border} !important; }
            .dfa-table tr:hover td { background: ${theme.bg} !important; }
            .mn-cell { background: ${theme.bg} !important; border-color: ${theme.border} !important; color: ${theme.text} !important; }
            .mn-cell.empty { background: transparent !important; border: none !important; }
            .sim-node { background: ${theme.bg} !important; color: ${theme.text} !important; border-color: ${theme.border} !important; }
            .stat-box { background: ${theme.bg} !important; border-color: ${theme.border} !important; }
            .log-entry { background: ${theme.bg} !important; border-color: ${theme.border} !important; color: ${theme.text} !important; }
            
            /* Primary Brand Color Replacement */
            .text-\\[\\#0071E3\\] { color: ${theme.hex} !important; }
            .bg-\\[\\#0071E3\\] { background-color: ${theme.hex} !important; }
            .border-\\[\\#0071E3\\] { border-color: ${theme.hex} !important; }
            .shadow-btn { box-shadow: 0 4px 12px ${theme.hex}33 !important; }
            .hover\\:bg-\\[\\#0077ED\\]:hover { background-color: ${theme.hover} !important; }
            .hover\\:text-\\[\\#0071E3\\]:hover { color: ${theme.hex} !important; }
            .hover\\:border-\\[\\#0071E3\\]:hover { border-color: ${theme.hex} !important; }
            [style*="color: #0071E3"], [style*="color: rgb(0, 113, 227)"] { color: ${theme.hex} !important; }
            [style*="background: #0071E3"], [style*="background: rgb(0, 113, 227)"] { background: ${theme.hex} !important; }
            [style*="border-color: #0071E3"], [style*="border-color: rgb(0, 113, 227)"] { border-color: ${theme.hex} !important; }
            [style*="borderTop: 3px solid #0071E3"] { border-top-color: ${theme.hex} !important; }
            
            /* D3 Graph SVG */
            circle.main-circle { fill: ${theme.panel} !important; stroke: ${theme.border} !important; }
            circle.accept-ring { stroke: ${theme.muted} !important; }
            text { fill: ${theme.text} !important; }
            .edge-path { stroke: ${theme.muted} !important; }
            .start-line { stroke: ${theme.text} !important; }
            .edge-label { fill: ${theme.text} !important; }
            .edge-label-bg { fill: ${theme.bg} !important; }
            
            /* Custom Hero Gradient */
            .hero-gradient { background: radial-gradient(ellipse 80% 60% at 50% -10%, ${theme.hex}1a 0%, transparent 70%), ${theme.bg} !important; transition: background 0.5s ease; }
          `;
        }
      }, [theme]);

      return (
        <div style={{ position: 'absolute', top: 24, right: 26, zIndex: 9999 }}>
          <div style={{ position: 'relative' }}>
            <button onClick={() => setIsOpen(!isOpen)}
              style={{
                display: 'flex', alignItems: 'center', gap: 6, padding: '8px 14px',
                background: theme.panel, backdropFilter: 'blur(10px)',
                border: '1px solid', borderColor: theme.border, borderRadius: 20, cursor: 'pointer',
                fontFamily: 'JetBrains Mono,monospace', fontSize: 12, fontWeight: 600,
                color: theme.text, boxShadow: '0 4px 12px rgba(0,0,0,0.08)',
                transition: 'all 0.2s'
              }}>
              <span style={{ width: 12, height: 12, borderRadius: '50%', background: theme.hex }}></span>
              Theme
            </button>
            {isOpen && (
              <div style={{
                position: 'absolute', top: '100%', right: 0, marginTop: 8,
                background: theme.panel, border: '1px solid', borderColor: theme.border, borderRadius: 16,
                padding: 6, boxShadow: '0 12px 40px rgba(0,0,0,0.2)', width: 165,
                display: 'flex', flexDirection: 'column', gap: 2,
                animation: 'fadeUp 0.15s ease-out forwards', color: theme.text
              }}>
                {THEMES.map(t => (
                  <button key={t.id} onClick={() => { setTheme(t); setIsOpen(false); }}
                    style={{
                      display: 'flex', alignItems: 'center', gap: 8, padding: '10px 12px',
                      background: theme.id === t.id ? theme.bg : 'transparent', border: 'none',
                      borderRadius: 10, cursor: 'pointer', textAlign: 'left',
                      fontFamily: 'JetBrains Mono,monospace', fontSize: 11, fontWeight: theme.id === t.id ? 700 : 500,
                      color: theme.id === t.id ? theme.text : theme.muted, width: '100%', transition: 'all 0.1s'
                    }}
                    onMouseEnter={e => { if (theme.id !== t.id) e.currentTarget.style.background = theme.bg; }}
                    onMouseLeave={e => { if (theme.id !== t.id) e.currentTarget.style.background = 'transparent'; }}>
                    <span style={{ width: 10, height: 10, borderRadius: '50%', background: t.hex }}></span>
                    {t.label}
                  </button>
                ))}
              </div>
            )}
          </div>
        </div>
      );
    }

    /* ═══════════════════════════════
       MAIN APP
    ═══════════════════════════════ */
    function App() {
      const [activeTab, setActiveTab] = useState('builder');
      const [tabKey, setTabKey] = useState(0);
      const [currentDFA, setCurrentDFA] = useState(null);
      const [minResult, setMinResult] = useState(null);
      const [toast, setToast] = useState(null);
      const [showExport, setShowExport] = useState(false);
      const appRef = useRef(null);

      const switchTab = name => { if (name === activeTab) return; setActiveTab(name); setTabKey(k => k + 1); };
      const showToast = (name, desc) => setToast({ name, desc, key: Date.now() });

      const TAB_CFG = [
        { id: 'builder', label: '① Build DFA' },
        { id: 'visualizer', label: '② Minimize' },
        { id: 'simulate', label: '③ Simulate' },
      ];

      return (
        <div style={{ position: 'relative' }}>
          <ThemeSelector />
          <HeroSection onScrollToApp={() => appRef.current?.scrollIntoView({ behavior: 'smooth' })} />
          <div id="features"><FeaturesSection /></div>

          <div ref={appRef} className="scroll-reveal" style={{ opacity: 0 }}>
            {/* Sticky Header */}
            <header className="glass-header sticky top-0 z-50 border-b border-[#D2D2D7]" style={{ boxShadow: '0 1px 12px rgba(0,0,0,0.05)' }}>
              <div style={{ maxWidth: 1320, margin: '0 auto', padding: '0 24px' }}>
                <div className="flex items-center justify-between gap-4 flex-wrap py-3.5">
                  <div className="flex items-center gap-3">
                    <span className="font-mono text-xl text-[#0071E3]" style={{ animation: 'pulse 3s ease-in-out infinite' }}>∂</span>
                    <div>
                      <div className="font-mono text-sm font-bold text-[#0071E3] leading-tight">DFA Minimizer</div>
                      <div className="font-mono text-[10px] text-[#6E6E73]">Myhill-Nerode Partition Visualizer</div>
                    </div>
                  </div>
                  <nav className="flex items-center gap-1">
                    {TAB_CFG.map(tab => (
                      <button key={tab.id} onClick={() => switchTab(tab.id)}
                        className={`relative font-mono text-xs px-5 py-2.5 rounded-xl border transition-all cursor-pointer ${activeTab === tab.id ? 'border-[#0071E3] bg-[rgba(0,113,227,.07)] text-[#0071E3] font-semibold' : 'border-transparent bg-transparent text-[#6E6E73] hover:bg-[#F5F5F7] hover:text-[#1D1D1F]'}`}>
                        {tab.label}
                      </button>
                    ))}
                  </nav>
                </div>
              </div>
            </header>

            {/* Main layout with sidebar */}
            <main style={{ maxWidth: 1320, margin: '0 auto', padding: '28px 24px 100px', display: 'flex', gap: 22, alignItems: 'start' }} className="app-body">
              <div style={{ flex: 1, minWidth: 0 }}>
                <div key={`${activeTab}-${tabKey}`}>
                  {activeTab === 'builder' && <BuildTab key="b" onDFABuilt={d => { setCurrentDFA(d); setMinResult(null); }} showToast={showToast} initDFA={currentDFA} />}
                  {activeTab === 'visualizer' && <MinimizeTab key="v" dfa={currentDFA} onMinDone={r => setMinResult(r)} />}
                  {activeTab === 'simulate' && <SimulateTab key="s" dfa={currentDFA} minResult={minResult} />}
                </div>
              </div>
              <GlassSidebar dfa={currentDFA} minResult={minResult} onExport={() => setShowExport(true)} />
            </main>
          </div>

          {showExport && <ExportModal dfa={currentDFA} minResult={minResult} onClose={() => setShowExport(false)} />}
          {toast && <Toast key={toast.key} name={toast.name} desc={toast.desc} onClose={() => setToast(null)} />}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>

  <style>
    @keyframes pulse {

      0%,
      100% {
        opacity: 1
      }

      50% {
        opacity: .45
      }
    }

    @media(max-width:800px) {

      .grid-2col,
      .grid-builder {
        grid-template-columns: 1fr !important
      }
    }

    @keyframes groupCardIn {
      0% {
        opacity: 0;
        transform: translateY(14px) scale(0.96);
      }

      100% {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    .group-card {
      animation: groupCardIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      opacity: 0;
    }

    @keyframes pairPopIn {
      0% {
        opacity: 0;
        transform: scale(0.7);
      }

      70% {
        transform: scale(1.08);
      }

      100% {
        opacity: 1;
        transform: scale(1);
      }
    }

    .pair-chip {
      animation: pairPopIn 0.3s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
      opacity: 0;
    }

    /* ── Giggle Physics ─────────────────────────────────────────── */

    /* Spring press: squish down → overshoot → settle */
    @keyframes springPress {
      0%   { transform: scale(1); }
      30%  { transform: scale(0.91) rotate(-0.6deg); }
      55%  { transform: scale(1.055) rotate(0.4deg); }
      72%  { transform: scale(0.978) rotate(-0.2deg); }
      86%  { transform: scale(1.013); }
      100% { transform: scale(1) rotate(0deg); }
    }

    /* Card hover giggle: gentle elastic rock */
    @keyframes cardGiggle {
      0%   { transform: rotate(0deg) scale(1); }
      15%  { transform: rotate(-1.2deg) scale(1.012); }
      35%  { transform: rotate(1.0deg) scale(1.018); }
      52%  { transform: rotate(-0.7deg) scale(1.012); }
      68%  { transform: rotate(0.5deg) scale(1.008); }
      82%  { transform: rotate(-0.2deg) scale(1.003); }
      100% { transform: rotate(0deg) scale(1); }
    }

    /* Logo perpetual bob */
    @keyframes logoBob {
      0%, 100% { transform: translateY(0) scale(1) rotate(0deg); }
      25%  { transform: translateY(-3px) scale(1.08) rotate(4deg); }
      50%  { transform: translateY(0px) scale(1.04) rotate(0deg); }
      75%  { transform: translateY(-2px) scale(1.06) rotate(-3deg); }
    }

    /* MN cell bounce when newly marked */
    @keyframes cellBounce {
      0%   { transform: scale(1); }
      25%  { transform: scale(1.32) rotate(6deg); }
      50%  { transform: scale(0.92) rotate(-3deg); }
      70%  { transform: scale(1.10) rotate(2deg); }
      85%  { transform: scale(0.97); }
      100% { transform: scale(1.18); } /* ends at .mn-cell.checking scale */
    }

    /* Stat-box pop in on mount */
    @keyframes statBounceIn {
      0%   { opacity: 0; transform: scale(0.6) translateY(12px); }
      55%  { transform: scale(1.08) translateY(-4px); }
      78%  { transform: scale(0.96) translateY(1px); }
      100% { opacity: 1; transform: scale(1) translateY(0); }
    }

    /* Chip entrance: extra springy */
    @keyframes chipSpring {
      0%   { opacity: 0; transform: scale(0.5) rotate(-8deg); }
      55%  { transform: scale(1.15) rotate(4deg); }
      75%  { transform: scale(0.94) rotate(-2deg); }
      90%  { transform: scale(1.04) rotate(1deg); }
      100% { opacity: 1; transform: scale(1) rotate(0deg); }
    }

    /* Toast shake-in from bottom */
    @keyframes toastBounce {
      0%   { opacity: 0; transform: translateX(-50%) translateY(28px) scale(0.88); }
      55%  { transform: translateX(-50%) translateY(-6px) scale(1.04); }
      75%  { transform: translateX(-50%) translateY(3px) scale(0.98); }
      100% { opacity: 1; transform: translateX(-50%) translateY(0) scale(1); }
    }

    /* Apply classes */
    .giggle-btn-press {
      animation: springPress 0.52s cubic-bezier(0.34, 1.56, 0.64, 1) forwards !important;
    }

    .giggle-card-hover {
      animation: cardGiggle 0.55s cubic-bezier(0.34, 1.2, 0.64, 1) forwards !important;
    }

    .giggle-logo {
      animation: logoBob 2.8s cubic-bezier(0.45, 0, 0.55, 1) infinite !important;
      display: inline-block;
      cursor: default;
    }

    .giggle-stat {
      animation: statBounceIn 0.55s cubic-bezier(0.34, 1.56, 0.64, 1) forwards !important;
    }

    /* Override pair-chip entrance with springier version */
    .pair-chip {
      animation: chipSpring 0.38s cubic-bezier(0.34, 1.56, 0.64, 1) forwards !important;
    }

    /* Override toast with bouncier version */
    .animate-toast-in {
      animation: toastBounce 0.52s cubic-bezier(0.34, 1.56, 0.64, 1) forwards !important;
    }

    /* Smooth transform origin for buttons */
    button {
      transform-origin: center center;
    }

    /* Feature cards: cursor feedback */
    .feature-card {
      cursor: default;
      transform-origin: center bottom;
    }

    /* Stat boxes get the bounce-in by default */
    .stat-box {
      animation: statBounceIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) both;
    }
  </style>

  <!-- ── Giggle Physics Engine ──────────────────────────────────── -->
  <script>
    (function () {
      // Spring-press on ALL buttons
      function attachButtonGiggle(btn) {
        if (btn.__giggled) return;
        btn.__giggled = true;

        btn.addEventListener('pointerdown', function (e) {
          this.classList.remove('giggle-btn-press');
          // Force reflow to restart animation
          void this.offsetWidth;
          this.classList.add('giggle-btn-press');
        });

        btn.addEventListener('animationend', function () {
          this.classList.remove('giggle-btn-press');
        });
      }

      // Card giggle on hover
      function attachCardGiggle(card) {
        if (card.__giggled) return;
        card.__giggled = true;

        card.addEventListener('mouseenter', function () {
          this.classList.remove('giggle-card-hover');
          void this.offsetWidth;
          this.classList.add('giggle-card-hover');
        });

        card.addEventListener('animationend', function (e) {
          if (e.animationName === 'cardGiggle') {
            this.classList.remove('giggle-card-hover');
          }
        });
      }

      // Logo bob
      function attachLogoBob(el) {
        if (!el || el.__giggled) return;
        el.__giggled = true;
        el.classList.add('giggle-logo');
      }

      // MutationObserver to catch React-rendered DOM
      const observer = new MutationObserver(function () {
        // Buttons
        document.querySelectorAll('button:not([__giggled])').forEach(attachButtonGiggle);

        // Feature cards
        document.querySelectorAll('.feature-card:not([__giggled])').forEach(attachCardGiggle);

        // Stat boxes: re-trigger bounce on value changes
        document.querySelectorAll('.stat-box').forEach(function (box) {
          if (!box.__giggled) {
            box.__giggled = true;
            box.style.animationDelay = (Math.random() * 0.12) + 's';
          }
        });

        // Logo ∂
        const logos = document.querySelectorAll('.font-mono.text-xl');
        logos.forEach(function (el) {
          if (el.textContent.trim() === '∂') attachLogoBob(el);
        });
      });

      observer.observe(document.body, { childList: true, subtree: true });

      // Initial pass after short delay for React hydration
      window.addEventListener('DOMContentLoaded', function () {
        setTimeout(function () {
          document.querySelectorAll('button').forEach(attachButtonGiggle);
          document.querySelectorAll('.feature-card').forEach(attachCardGiggle);
          document.querySelectorAll('.font-mono.text-xl').forEach(function (el) {
            if (el.textContent.trim() === '∂') attachLogoBob(el);
          });
        }, 300);
      });

      // Extra: stagger stat-box animations on visibility
      const statObserver = new IntersectionObserver(function (entries) {
        entries.forEach(function (entry, i) {
          if (entry.isIntersecting) {
            var el = entry.target;
            el.style.animation = 'none';
            void el.offsetWidth;
            el.style.animation = 'statBounceIn 0.55s ' + (i * 0.07) + 's cubic-bezier(0.34,1.56,0.64,1) both';
            statObserver.unobserve(el);
          }
        });
      }, { threshold: 0.3 });

      // Observe stat boxes as they appear
      new MutationObserver(function () {
        document.querySelectorAll('.stat-box:not([data-observed])').forEach(function (el) {
          el.dataset.observed = '1';
          statObserver.observe(el);
        });
      }).observe(document.body, { childList: true, subtree: true });

    })();
  </script>
